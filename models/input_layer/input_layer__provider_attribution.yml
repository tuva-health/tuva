                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_financial_pmpm
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: year_month
        description: Unique year-month in the dataset computed from eligibility.
        mapping_instructions: 'No explicit mapping instructions provided.'
        required_for_data_marts: ['ahrq_measures', 'cms_hccs', 'financial_pmpm', 'provider_attribution', 'semantic_layer']
