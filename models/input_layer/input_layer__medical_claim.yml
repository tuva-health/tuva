      - name: procedure_code_type
        description: 'Coding system used for ICD procedure codes on the claim. This header-level field on inpatient institutional claims must be consistent across all lines for the same claim and should be populated whenever ICD procedure codes are present. Allowed values are icd-9-pcs and icd-10-pcs. If the source does not explicitly provide procedure_code_type, a common approach is to infer it from service date: use icd-9-pcs for dates before 2015-10-01 and icd-10-pcs for dates after 2015-10-01. If the source spans the transition period and omits the code type, infer the value using both the date of service and the procedure code pattern.'
        mapping_instructions: 'Populate procedure_code_type whenever any procedure_code_1 through procedure_code_25 is populated. The allowed values are icd-9-pcs and icd-10-pcs. If the source does not explicitly provide the code type, it can be inferred using the ICD-9 to ICD-10 transition date when appropriate. This is a header-level field for inpatient institutional claims and must be identical across all lines for the same claim_id.'
        required_for_data_marts: []
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
          - accepted_values:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
              arguments:
                values:
                  - icd-10-pcs
                  - icd-9-pcs
        config:
          meta:
            data_type: varchar
      - name: procedure_code_1
        description: 1st ICD (9 or 10) procedure code on the claim.
        mapping_instructions: 'Map ICD procedure codes from the claim header into procedure_code_1 through procedure_code_25. The mapped value in this position should be a valid ICD-9-PCS or ICD-10-PCS procedure code and must be identical across all lines for the same claim_id. If this position is not present on the claim, leave it null.'
        required_for_data_marts: []
        tests:
