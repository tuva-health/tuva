                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_ccsr
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_readmission
              arguments:
                values:
                  - icd-10-cm
                  - icd-9-cm
        config:
          meta:
            data_type: varchar
      - name: diagnosis_code_1
        description: 1st ICD (9 or 10) CM diagnosis code on the claim.
        mapping_instructions: 'Map diagnosis codes from the claim header into diagnosis_code_1 through diagnosis_code_25. For institutional claims, map the principal diagnosis to diagnosis_code_1 and any remaining diagnosis codes to the subsequent fields. For professional claims, source systems often store diagnosis pointers rather than principal or secondary labels, but the diagnosis codes should still be consolidated into diagnosis_code_1 through diagnosis_code_25 in claim order. The mapped value in this position should be a valid ICD-9-CM or ICD-10-CM diagnosis code and must be identical across all lines for the same claim_id. If this position is not present on the claim, leave it null.'
