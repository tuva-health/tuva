version: 2
models:
  - name: input_layer__medical_claim
    description: >-
      The medical_claim table contains information on healthcare services and
      supplies provided to patients, billed by providers, and paid for by
      health insurers. It includes information on the provider who rendered the
      service, the amount paid for the service by the health insurer, and the
      underlying reason for the service, such as diagnosis. Medical claims data
      may include original, adjusted, reversed, or final claims. It is up to
      the person mapping the dataset to make the correct determination about
      these nuances and filter out all but final claims; otherwise key metrics
      such as cost, utilization, and outcomes will be incorrect.
    grain: Intended to be one record per claim line per data source.
    mapping_instructions: ''
    tests:
      - dbt_utils.unique_combination_of_columns:
          config:
            severity: error
            enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
            tags:
              - tuva_dqi_sev_1
              - dqi
              - dqi_service_categories
              - dqi_ccsr
              - dqi_cms_chronic_conditions
              - dqi_tuva_chronic_conditions
              - dqi_cms_hccs
              - dqi_ed_classification
              - dqi_financial_pmpm
              - dqi_quality_measures
              - dqi_readmission
          arguments:
            combination_of_columns:
              - claim_id
              - claim_line_number
              - data_source
      - the_tuva_project.expect_column_pair_values_A_to_be_greater_than_B:
          config:
            severity: warn
            enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
            tags:
              - tuva_dqi_sev_3
              - dqi
              - dqi_cms_chronic_conditions
              - dqi_tuva_chronic_conditions
              - dqi_cms_hccs
              - dqi_ed_classification
              - dqi_financial_pmpm
              - dqi_quality_measures
              - dqi_readmission
          arguments:
            column_A: claim_end_date
            column_B: claim_start_date
            or_equal: true
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_input_layer{% else %}input_layer{%- endif -%}
      tags: input_layer
      materialized: view
    columns:
      - name: claim_id
        description: |
          Unique identifier for a claim. Each claim represents a distinct healthcare service or set of services provided 
          to a patient. This is a string that links each row in the table to the unique claim to which it belongs. Keep in 
          mind that the medical_claim table is at the claim line grain, i.e. each row in the table corresponds to a unique 
          claim line. If a given claim has N lines, there are N lines in the medical_claim table with the same claim_id value 
          (one for each line in the claim). The claim_id value is required to be populated for every row in the medical_claim 
          table.
        mapping_instructions: ''
        required_for_data_marts: ['ccsr', 'claims_enrollment', 'cms_chronic_conditions', 'cms_hccs', 'encounters', 'financial_pmpm', 'hcc_recapture', 'hcc_suspecting', 'provider_attribution', 'quality_measures', 'semantic_layer', 'service_categories']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: error
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_service_categories
                  - dqi_ccsr
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
          - not_null:
              config:
                severity: error
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_service_categories
                  - dqi_ccsr
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
        config:
          meta:
            data_type: varchar
            is_primary_key: true
      - name: claim_line_number
        description: 'Indicates the line number for the particular line of the claim. This is a positive integer that identifies the claim line that a given row on the table represents. The values of claim_line_number for a given claim_id must be sequential positive integers starting at 1. For example, if claim_id = ABC has 4 claim lines (i.e., 4 rows on the medical_claim table), those 4 rows must have claim_line_number equal to 1, 2, 3, and 4, respectively. The claim_line_number field should be populated for every row in the medical_claim table. Claims data sources may contain claim line numbers that do not behave as expected. For example, they might not start at 1, they may not be sequential (incremented by 1), or claim line numbers may repeat when the lines seem to correspond to different line items. In this case, or when a claim_line_number is not present in the source data, claim_line_number can be created manually: row_number() over (partition by claim_id order by claim_start_date) as claim_line_number'
        mapping_instructions: ''
        required_for_data_marts: ['claims_enrollment', 'cms_hccs', 'encounters', 'financial_pmpm', 'provider_attribution', 'semantic_layer', 'service_categories']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: error
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_service_categories
                  - dqi_ccsr
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
          - not_null:
              config:
                severity: error
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_service_categories
                  - dqi_ccsr
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
        config:
          meta:
            data_type: integer
            is_primary_key: true
      - name: claim_type
        description: 'Header-level classification of the medical claim as institutional, professional, or undetermined. The value should be consistent across all lines for the same claim_id and should be populated for every row in the medical_claim table. A claim is institutional if one or more institutional indicators are populated, including bill_type_code, drg_code, admit_type_code, admit_source_code, discharge_disposition_code, or revenue_center_code. A claim is professional if none of those institutional indicators are populated and at least one place_of_service_code is populated. If neither condition is met, map the claim as undetermined. This field is used downstream in Tuva logic, so the classification should reflect the claim at the header level rather than vary by line.'
        mapping_instructions: 'Map every claim to institutional, professional, or undetermined. This is a header-level field and must be identical across all lines for the same claim_id. Professional claims should have place_of_service_code and should not carry institutional-only indicators such as bill_type_code, admit_type_code, admit_source_code, discharge_disposition_code, drg_code, or revenue_center_code. Institutional claims should have bill_type_code and revenue_center_code and should not carry place_of_service_code. If the source does not cleanly support either pattern, map the claim to undetermined until the classification can be resolved. This field is critical because downstream service category grouping and encounter grouping depend on it.'
        required_for_data_marts: ['cms_hccs', 'encounters', 'semantic_layer', 'service_categories']
        tests:
          - the_tuva_project.expect_column_unique_value_count_to_be_between:
              description: A claim cannot be both professional and institutional within the same claim id.
              config:
                severity: error
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                meta:
                  dqi_test_description: A claim cannot be both professional and institutional within the same claim id.
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_service_categories
                  - dqi_ccsr
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
              arguments:
                min_value: 1
                max_value: 1
                group_by:
                  - claim_id
                strictly: false
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_cms_hccs
          - not_null:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_cms_hccs
          - accepted_values:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_cms_hccs
              arguments:
                values:
                  - professional
                  - institutional
                  - undetermined
        config:
          meta:
            data_type: varchar
      - name: person_id
        description: Unique identifier for each person in the dataset. person_id is a required (string) field that ideally contains a person-level UUID (Universally Unique Identifier), if available. This can be populated from the Tuva EMPI Engine or with your own Master Patient Index identifier. If you dont have a UUID, we recommend mapping the source patient identifier to this field (member_id for claims and patient_id for clinical).
        mapping_instructions: 'Map the unique identifier for the person receiving care. Every claim should have one and only one person_id, and the same person should not appear under multiple person_ids. This is the person-level identifier that should remain stable across plans, member IDs, and claims when that information is available.'
        required_for_data_marts: ['ahrq_measures', 'ccsr', 'claims_enrollment', 'cms_chronic_conditions', 'cms_hccs', 'ed_classification', 'encounters', 'financial_pmpm', 'hcc_recapture', 'hcc_suspecting', 'provider_attribution', 'quality_measures', 'readmissions', 'semantic_layer', 'tuva_chronic_conditions']
        tests:
          - the_tuva_project.expect_column_unique_value_count_to_be_between:
              description: A claim should not belong to two different people.
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                meta:
                  dqi_test_description: A claim should not belong to two different people.
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_ccsr
                  - dqi_cms_chronic_conditions
                  - dqi_readmission
              arguments:
                min_value: 1
                max_value: 1
                group_by:
                  - claim_id
                strictly: false
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_ccsr
                  - dqi_cms_chronic_conditions
                  - dqi_readmission
          - not_null:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_ccsr
                  - dqi_cms_chronic_conditions
                  - dqi_readmission
        config:
          meta:
            data_type: varchar
      - name: member_id
        description: Identifier that links a patient to a particular insurance product or health plan. A patient can have more than one member_id because they can have more than one insurance product/plan. This field is a string that links each row to a given member. This field should be populated for every row in the medical_claim table. It is a header-level field, so its value must be the same for all lines in a given claim.
        mapping_instructions: 'Map the member identifier assigned to the person for the specific health plan covering the claim. A person can have multiple member_ids over time or across plans, so member_id does not need to be globally unique to the person. This is a header-level field and must be identical across all lines for the same claim_id.'
        required_for_data_marts: ['claims_enrollment', 'financial_pmpm']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
        config:
          meta:
            data_type: varchar
      - name: payer
        description: Name of the payer (i.e. health insurer) providing coverage. payer contains the name of the health insurance payer for the claim (Aetna, Blue Cross Blue Shield, etc). The source data may not contain this field. In that case, the field can be set to a specific value.
        mapping_instructions: 'Map the name of the payer responsible for the claim, such as Aetna, Blue Cross Blue Shield, Medicare CCLF, or Medicare MSSP. In many claims data sets the payer is effectively the data source and can be hard-coded when the source only contains one payer.'
        required_for_data_marts: ['claims_enrollment', 'cms_hccs', 'financial_pmpm', 'hcc_recapture', 'hcc_suspecting', 'semantic_layer']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_financial_pmpm
          - the_tuva_project.warn_if_null_percentage_is_100:
              description: Percentage of values that are null.
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_5
                  - dqi
                  - dqi_financial_pmpm
        config:
          meta:
            data_type: varchar
      - name: plan
        description: Name of the plan (i.e. sub contract) providing coverage. This field is a string that links every row to the the specific health insurance plan or sub-contract specific to a members enrollment (e.g. Aetna Gold, BCBS Chicago, etc). plan values may not come in the source data. This field should be hard-coded (e.g. select aetna bronze 1 as plan).
        mapping_instructions: 'Map the plan or product name associated with the coverage on the claim, such as Humana PPO or Humana HMO. This field is especially useful for commercial claims. If the source data does not provide the plan name, it is acceptable to hard-code a stable plan value for the data source.'
        required_for_data_marts: ['claims_enrollment', 'cms_hccs', 'financial_pmpm', 'semantic_layer']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_financial_pmpm
          - the_tuva_project.warn_if_null_percentage_is_100:
              description: Percentage of values that are null.
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_5
                  - dqi
                  - dqi_financial_pmpm
        config:
          meta:
            data_type: varchar
      - name: claim_start_date
        description: 'The date when the healthcare service was provided. Format: YYYY-MM-DD.'
        mapping_instructions: 'Map the header-level start date for the claim. Every claim should have a claim_start_date and the value must be identical across all lines for the same claim_id. If the source date is delivered as text, cast it to a date in YYYY-MM-DD format during mapping. claim_start_date must always be less than or equal to claim_end_date.'
        required_for_data_marts: ['claims_enrollment', 'cms_chronic_conditions', 'cms_hccs', 'encounters', 'financial_pmpm', 'provider_attribution', 'quality_measures', 'semantic_layer', 'service_categories']
        tests:
          - the_tuva_project.expect_column_unique_value_count_to_be_between:
              description: A claim should not have multiple start dates within the same claim id.
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                meta:
                  dqi_test_description: A claim should not have multiple start dates within the same claim id.
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
              arguments:
                min_value: 1
                max_value: 1
                group_by:
                  - claim_id
                strictly: false
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
          - the_tuva_project.expect_column_values_to_be_between:
              description: This is a test on all dates to see if they are within a reasonable range.
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                meta:
                  dqi_test_description: 'This is a test on all dates to see if they are within a reasonable range. '
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
              arguments:
                min_value: '''1900-01-02'''
                max_value: '''2050-01-02'''
                strictly: false
          - the_tuva_project.expect_column_values_to_be_of_type:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
              arguments:
                column_type: date
          - not_null:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
        config:
          meta:
            data_type: date
      - name: claim_end_date
        description: End date for the claim.
        mapping_instructions: 'Map the header-level end date for the claim. Every claim should have a claim_end_date and the value must be identical across all lines for the same claim_id. If the source date is delivered as text, cast it to a date in YYYY-MM-DD format during mapping. claim_end_date must always be greater than or equal to claim_start_date.'
        required_for_data_marts: ['cms_hccs', 'encounters', 'financial_pmpm', 'provider_attribution', 'quality_measures', 'semantic_layer', 'service_categories']
        tests:
          - the_tuva_project.expect_column_unique_value_count_to_be_between:
              description: A claim should not have multiple end dates within the same claim id.
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                meta:
                  dqi_test_description: A claim should not have multiple end dates within the same claim id.
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
              arguments:
                min_value: 1
                max_value: 1
                group_by:
                  - claim_id
                strictly: false
          - not_null:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
          - the_tuva_project.expect_column_values_to_be_between:
              description: This is a test on all dates to see if they are within a reasonable range.
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                meta:
                  dqi_test_description: 'This is a test on all dates to see if they are within a reasonable range. '
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
              arguments:
                min_value: '''1900-01-02'''
                max_value: '''2050-01-02'''
                strictly: false
          - the_tuva_project.expect_column_values_to_be_of_type:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
              arguments:
                column_type: date
        config:
          meta:
            data_type: date
      - name: claim_line_start_date
        description: Start date for the claim line.
        mapping_instructions: 'Map the start date for the individual claim line. Every claim line should have a claim_line_start_date. If the source date is delivered as text, cast it to a date in YYYY-MM-DD format during mapping. claim_line_start_date must always be less than or equal to claim_line_end_date.'
        required_for_data_marts: ['claims_enrollment', 'encounters', 'semantic_layer', 'service_categories']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_financial_pmpm
          - the_tuva_project.expect_column_values_to_be_between:
              description: This is a test on all dates to see if they are within a reasonable range.
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                meta:
                  dqi_test_description: 'This is a test on all dates to see if they are within a reasonable range. '
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_financial_pmpm
              arguments:
                min_value: '''1900-01-02'''
                max_value: '''2050-01-02'''
                strictly: false
          - the_tuva_project.expect_column_values_to_be_of_type:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_financial_pmpm
              arguments:
                column_type: date
          - the_tuva_project.warn_if_null_percentage_is_100:
              description: Percentage of values that are null.
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_5
                  - dqi
                  - dqi_financial_pmpm
          - not_null:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_financial_pmpm
        config:
          meta:
            data_type: date
      - name: claim_line_end_date
        description: End date for the claim line.
        mapping_instructions: 'Map the end date for the individual claim line. Every claim line should have a claim_line_end_date. If the source date is delivered as text, cast it to a date in YYYY-MM-DD format during mapping. claim_line_end_date must always be greater than or equal to claim_line_start_date.'
        required_for_data_marts: ['encounters', 'semantic_layer', 'service_categories']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
