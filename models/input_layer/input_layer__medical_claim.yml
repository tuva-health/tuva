      - name: facility_npi
        description: 'Facility NPI for the claim, typically representing the location where services were delivered. An NPI is a 10-digit numeric identifier, and Tuva validates the expected length and character pattern. Some source systems provide only a single NPI field without distinguishing rendering, billing, and facility roles. In that case, use provider data to determine whether the identifier belongs to a person or a place: if it belongs to a place on an institutional claim, map it to facility_npi; if it belongs to a person, map it to rendering_npi instead and, on professional claims, consider whether it also belongs in billing_npi.'
        mapping_instructions: 'Map the NPI for the facility where services were delivered. Inpatient institutional claims should have a facility_npi. If the source only provides a single NPI field, use provider reference data to determine whether the identifier is an organization or facility-level NPI before mapping it to facility_npi.'
        required_for_data_marts: ['ahrq_measures', 'ed_classification', 'encounters', 'readmissions', 'semantic_layer', 'service_categories']
        tests:
          - not_null:
              description: >
                The encounter grouper depends on this field and will not work as intended if this is not provided.
                If you have an NPI field and are unsure if the NPI is a facility NPI (i.e. level 2 org NPI), then 
                join to terminology.provider and filter to level 2 NPIs only.

                If left as null, then encounters will under-merge since encounter merging depends on the facility NPI field. 
                There are two primary options if facility NPIs (i.e. level 2 NPIs) are not available:
                - Leave null: This mean claims will not merge based on encounter grouping logic since all claims are assumed to be in different facilities.
                - Add a blank string: This will over-merge, but will apply encounter grouping logic and assumes all encounters are at the same facility.
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                where: "claim_type = 'institutional' and substring(bill_type_code, 1, 2) in ('11', '12', '15', '16', '17', '18', '21', '22', '25', '26', '27', '28', '31', '41', '42', '45', '46', '47', '48', '61', '62', '65', '66', '67', '68', '82')"
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_readmission
          - the_tuva_project.expect_column_value_lengths_to_equal:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_readmission
              arguments:
                value: 10
          - the_tuva_project.expect_column_values_to_match_regex:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
              arguments:
                regex: ^[0-9]{10}$
                pattern1: '[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]'
        config:
          meta:
            data_type: varchar
