          - the_tuva_project.expect_column_values_to_be_of_type:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_tuva_chronic_conditions
              arguments:
                column_type: date
          - not_null:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                where: "claim_type = 'institutional' and substring(bill_type_code, 1, 2) in ('11', '12', '15', '16', '17', '18', '21', '22', '25', '26', '27', '28', '31', '41', '42', '45', '46', '47', '48', '61', '62', '65', '66', '67', '68', '82')"
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_tuva_chronic_conditions
        config:
          meta:
            data_type: date
      - name: discharge_date
        description: Discharge date for the claim (inpatient claims only).
        mapping_instructions: 'Populate discharge_date for inpatient facility claims such as acute inpatient, skilled nursing, inpatient rehabilitation, hospice inpatient, swing bed, and other institutional inpatient stays identified from bill_type_code. If the source date is delivered as text, cast it to a date in YYYY-MM-DD format during mapping. discharge_date should be greater than or equal to admission_date.'
        required_for_data_marts: ['encounters', 'readmissions', 'semantic_layer', 'service_categories']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_tuva_chronic_conditions
          - the_tuva_project.expect_column_values_to_be_between:
              description: This is a test on all dates to see if they are within a reasonable range.
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                meta:
                  dqi_test_description: 'This is a test on all dates to see if they are within a reasonable range. '
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_tuva_chronic_conditions
              arguments:
                min_value: '''1900-01-02'''
                max_value: '''2050-01-02'''
                strictly: false
          - the_tuva_project.expect_column_values_to_be_of_type:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_tuva_chronic_conditions
              arguments:
                column_type: date
          - not_null:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                where: "claim_type = 'institutional' and substring(bill_type_code, 1, 2) in ('11', '12', '15', '16', '17', '18', '21', '22', '25', '26', '27', '28', '31', '41', '42', '45', '46', '47', '48', '61', '62', '65', '66', '67', '68', '82')"
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_tuva_chronic_conditions
        config:
          meta:
            data_type: date
      - name: admit_source_code
        description: Indicates where the patient was before the healthcare encounter (inpatient claims only). This field is a single-character string that indicates a patients location prior to admission, and exists only in institutional claims. This is another header-level value, which means there should be only 1 distinct value over a single claim_id.
        mapping_instructions: 'Map the admit source code from the claim header for inpatient institutional claims when it is available. This is a header-level field and should be identical across all lines for the same claim_id. The mapped value should conform to Tuva terminology for admit_source_code.'
        required_for_data_marts: ['ahrq_measures', 'encounters', 'semantic_layer']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
          - the_tuva_project.expect_column_value_lengths_to_equal:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
              arguments:
                value: 1
        config:
          meta:
            data_type: varchar
      - name: admit_type_code
        description: Indicates the type of admission (inpatient claims only). This field is a string that indicates the priority of admission (e.g. Urgent, Emergent, Elective, etc.) This is another header-level value, which means there should be only 1 distinct value over a single claim_id. Along with admit_source_code, these codes are maintained by the National Uniform Billing Committee (NUBC).
        mapping_instructions: 'Map the admit type code from the claim header for inpatient institutional claims when it is available. This is a header-level field and should be identical across all lines for the same claim_id. The mapped value should conform to Tuva terminology for admit_type_code.'
        required_for_data_marts: ['encounters', 'semantic_layer']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
          - the_tuva_project.expect_column_value_lengths_to_equal:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
              arguments:
                value: 1
          - the_tuva_project.expect_column_values_to_match_regex:
              description: https://resdac.org/cms-data/variables/claim-inpatient-admission-type-code-ffs
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                meta:
                  dqi_test_description: https://resdac.org/cms-data/variables/claim-inpatient-admission-type-code-ffs
                tags:
                  - tuva_dqi_sev_2
                  - dqi
              arguments:
                regex: ^[0-59]$
                pattern1: '[0123459]'
        config:
          meta:
            data_type: varchar
      - name: discharge_disposition_code
        description: 'Indicates the type of setting the patient was discharged to (institutional inpatient claims only). This field is a two-character string that represents one of the standard discharge_disposition_code values. This field should be populated for all institutional claims and is a header-level field, so its value must be the same for all rows in a given claim. Note that in source data this column might be called discharge status or patient status. DQI checks that the value of this field is a two-character string and that it is consistent across all lines for a given claim_id. Note that discharge_disposition_code values may have leading zeroes. Often, these leading zeroes are missing in the source data. This issue should be corrected during the mapping process, and one way to handle this could be the following: ```sql lpad(discharge_disposition_code, 2, 0) as discharge_disposition_code ```'
        mapping_instructions: 'Map the discharge disposition code from the claim header for institutional inpatient claims when it is available. This is a header-level field and should be identical across all lines for the same claim_id. The mapped value should conform to Tuva terminology for discharge_disposition_code and should preserve leading zeroes when they exist in the standard code set.'
        required_for_data_marts: ['encounters', 'readmissions', 'semantic_layer']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_readmission
          - relationships:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_readmission
              arguments:
                to: ref('terminology__discharge_disposition')
                field: discharge_disposition_code
        config:
          meta:
            data_type: varchar
      - name: place_of_service_code
        description: 'Place of service code for professional claims. This is a line-level, two-character code that identifies the location where the medical service was provided, so values may differ across lines within the same claim. Professional claim lines should have a place_of_service_code; institutional claims should not use this field. Tuva checks that the value is two characters long, but downstream terminology validation determines whether it is a valid standard place_of_service_code. If source data omits this value for some professional claim lines, some organizations backfill 99 for Other Place of Service. Preserve leading zeroes when they exist in the standard code set and normalize missing leading zeroes during mapping.'
        mapping_instructions: 'Map the place of service code at the claim-line level for professional claims. Every professional claim line should have a place_of_service_code, and institutional claims should not use this field. The mapped value should conform to Tuva terminology for place_of_service_code and should preserve leading zeroes when they exist in the standard code set.'
        required_for_data_marts: ['encounters', 'quality_measures', 'semantic_layer', 'service_categories']
        tests:
          - not_null:
              description: If a claim is professional, it should have a place of service code via CMS-1500.
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                where: claim_type = 'professional'
                meta:
                  dqi_test_description: 'If a claim is professional, it should have a place of service code via CMS-1500. '
                tags:
                  - tuva_dqi_sev_4
                  - dqi
                  - dqi_quality_measures
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_quality_measures
          - the_tuva_project.expect_column_value_lengths_to_equal:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_quality_measures
              arguments:
                value: 2
          - the_tuva_project.expect_column_values_to_match_regex:
              description: https://resdac.org/cms-data/variables/claim-inpatient-admission-type-code-ffs
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                meta:
                  dqi_test_description: https://resdac.org/cms-data/variables/claim-inpatient-admission-type-code-ffs
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_quality_measures
              arguments:
                regex: ^[0-9]{2}$
                pattern1: '[0-9][0-9]'
        config:
          meta:
            data_type: varchar
      - name: bill_type_code
        description: Bill type code for the claim (institutional claims only). This field is a three- or four-character string that represents one of the standard bill type code values. In the case that this code is three characters, we expect two numbers followed by a letter. If its four characters, we expect a leading 0. This field should be populated for all institutional claims and is a header-level field, so its value must be the same for all rows in a given claim. DQI ensures that this value matches the expected character pattern and that it is consistent across all lines for a given claim_id.
        mapping_instructions: 'Map the bill type code for institutional claims. Every institutional claim line should have a bill_type_code, and there should be one and only one bill_type_code per institutional claim. This is header-level information, so it should be identical across all lines for the same claim_id. The mapped value should conform to Tuva terminology for bill_type_code.'
        required_for_data_marts: ['cms_hccs', 'encounters', 'semantic_layer', 'service_categories']
        tests:
          - the_tuva_project.expect_column_unique_value_count_to_be_between:
              description: A claim should not have multiple bill type codes within the same claim id.
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                meta:
                  dqi_test_description: A claim should not have multiple bill type codes within the same claim id.
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_cms_chronic_conditions
              arguments:
                min_value: 0
                max_value: 1
                group_by:
                  - claim_id
                strictly: false
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_cms_chronic_conditions
          - not_null:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                where: claim_type = 'institutional'
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_cms_chronic_conditions
          - the_tuva_project.expect_column_value_lengths_to_be_between:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_cms_chronic_conditions
              arguments:
                min_value: 3
                max_value: 4
          - the_tuva_project.expect_column_values_to_match_regex:
              description: 3 digits, 2 numbers followed by letter. If 4, leading 0.
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                meta:
                  dqi_test_description: 3 digits, 2 numbers followed by letter. If 4, leading 0.
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_cms_chronic_conditions
              arguments:
                regex: ^([0-9]{2}[0-9A-Za-z]|0[0-9]{2}[0-9A-Za-z])$
                pattern1: '[0-9][0-9][0-9A-Za-z]'
                pattern2: 0[0-9][0-9][0-9A-Za-z]
        config:
          meta:
            data_type: varchar
      - name: drg_code_type
        description: 'The DRG system used for the claim. This is a string that specifies the DRG code system associated with a given drg_code. There are two accepted values for this field: ms-drg and apr-drg. There are downstream joins to terminology that depend on this field, and populating it correctly when the information is available will lead to the best and most accurate analytics on your data,'
        mapping_instructions: 'Populate drg_code_type whenever drg_code is populated. The allowed values are ms-drg and apr-drg. Acute inpatient claims should have a valid DRG code and a matching DRG code type because downstream grouping and analytics depend on the combination of both fields.'
        required_for_data_marts: ['cms_chronic_conditions', 'encounters', 'readmissions', 'semantic_layer', 'service_categories']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_financial_pmpm
                  - dqi_readmission
          - accepted_values:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_financial_pmpm
                  - dqi_readmission
              arguments:
                values:
                  - ms-drg
                  - apr-drg
          - not_null:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                where: drg_code is not null
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_financial_pmpm
                  - dqi_readmission
        config:
          meta:
            data_type: varchar
      - name: drg_code
        description: 'The DRG code on the claim. This field is a three-character string that can contain two different types of DRG (Diagnosis Related Groups) codes: 1. MS-DRGs are a classification system used by Medicare to categorize inpatient hospital stays and group them based on a patient’s diagnosis, procedures performed, age, sex, and complications or comorbidities. MS-DRGs are necessary for Medicare reimbursement but often used by hospitals as a standard for all inpatient stays. 2. APR-DRGs stands for "all patient refined DRG". This code system was developed by 3M to extend DRGs to a more general patient population. DQI expects these values to be three characters in length, and this is one of the fields that, when present, may be used to determine claim_type.'
        mapping_instructions: 'Map the DRG code from the claim header when it is present. Acute inpatient claims should have one and only one valid DRG code per claim, and the code should be paired with drg_code_type. This is header-level information, so it should be identical across all lines for the same claim_id.'
        required_for_data_marts: ['ahrq_measures', 'cms_chronic_conditions', 'encounters', 'readmissions', 'semantic_layer', 'service_categories']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_financial_pmpm
                  - dqi_readmission
          - the_tuva_project.expect_column_value_lengths_to_equal:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_financial_pmpm
                  - dqi_readmission
              arguments:
                value: 3
          - not_null:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                where: "claim_type = 'institutional' and substring(bill_type_code, 1, 2) in ('11', '12')"
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_financial_pmpm
                  - dqi_readmission
        config:
          meta:
            data_type: varchar
      - name: revenue_center_code
        description: 'Revenue center code for the claim line (institutional only and typically multiple codes per claim). This field is a four-character string that represents one of the standard revenue center code values. These codes are used to account for services and supplies rendered to patients in institutional care settings. As such, this field should be populated for institutional claims and is a line-level field, so its value may be different across lines in a given claim. DQI checks that the value of this field is a four-character string. DQI also ensures that revenue_center_code values match the expected character pattern. The majority of revenue_center_code values have at least one leading zero. In files coming directly from carriers, these leading zeroes may be stripped. Its possible to handle stripped leading zeroes like this: ```sql lpad(revenue_center_code, 4, 0) as revenue_center_code ```'
        mapping_instructions: 'Map the revenue center code at the claim-line level for institutional claims. Every institutional claim line should have a revenue_center_code, and institutional claims will often have multiple revenue_center_code values across their lines. The mapped value should conform to Tuva terminology for revenue_center_code and should preserve leading zeroes when they exist in the standard code set.'
        required_for_data_marts: ['encounters', 'semantic_layer', 'service_categories']
        tests:
          - not_null:
              description: Missing revenue codes for institutional claims. Severity 5 as triggers if at least on revenue code is missing.
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                where: claim_type = 'institutional'
                meta:
                  dqi_test_description: 'Missing revenue codes for institutional claims. Severity 5 as triggers if at least on revenue code is missing. '
                tags:
                  - tuva_dqi_sev_5
                  - dqi
                  - dqi_quality_measures
          - the_tuva_project.expect_column_unique_value_count_to_be_between:
              description: For institutional claims, should be some distinct count of different revenue codes
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                meta:
                  dqi_test_description: For institutional claims, should be some distinct count of different revenue codes
                tags:
                  - tuva_dqi_sev_4
                  - dqi
                  - dqi_financial_pmpm
              arguments:
                min_value: 5
                max_value: 1000
                group_by:
                  - data_source
                row_condition: claim_type = 'institutional'
                strictly: false
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_financial_pmpm
          - the_tuva_project.expect_column_value_lengths_to_be_between:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_financial_pmpm
              arguments:
                min_value: 3
                max_value: 4
          - the_tuva_project.expect_column_values_to_match_regex:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_financial_pmpm
              arguments:
                regex: ^(\\d{3}|0\\d{3})$
                pattern1: '[0-9][0-9][0-9]'
                pattern2: '[01239][0-9][0-9][0-9]'
        config:
          meta:
            data_type: varchar
      - name: service_unit_quantity
        description: The number of units for the particular revenue center code. This is a numeric that corresponds to the number of units associated with a particular revenue_center_code. In source data, this value can be negative. Appropriately applying Adjustments, Denials, and Reversals (ADR) logic to medical claims should yield positive values for this field.
        mapping_instructions: ''
        required_for_data_marts: ['semantic_layer']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
        config:
          meta:
            data_type: number
      - name: hcpcs_code
        description: 'HCPCS or CPT code for the procedure, service, or supply provided on the claim line. This line-level field may vary across lines within the same claim. Level 1 HCPCS codes are CPT codes maintained by the American Medical Association, while Level 2 HCPCS codes are maintained by CMS; Tuva terminology covers Level 2 only. Professional claims are generally expected to have hcpcs_code values, and Tuva validates Level 2 mappings when applicable. Source values sometimes include suffixes or formatting differences, so normalization such as trimming suffixes may be needed during mapping. If no specific code is available, some organizations backfill 99499 for unlisted evaluation and management services, but that choice is use-case dependent.'
        mapping_instructions: 'Map the CPT or HCPCS code at the claim-line level. Every professional claim line should have one and only one hcpcs_code. Institutional claims may also carry HCPCS codes, but they are less consistently required. If the source appends suffixes or other nonstandard characters, normalize the value before mapping so the resulting code is the standard claim-line procedure code.'
        required_for_data_marts: ['cms_hccs', 'encounters', 'provider_attribution', 'quality_measures', 'semantic_layer', 'service_categories']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_financial_pmpm
                  - dqi_quality_measures
          - not_null:
              description: Procedure code should not be null on professional claims.
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                where: claim_type = 'professional'
                meta:
