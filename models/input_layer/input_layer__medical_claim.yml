      - name: admission_date
        description: Admission date for the claim (inpatient claims only).
        mapping_instructions: 'Populate admission_date for inpatient facility claims such as acute inpatient, skilled nursing, inpatient rehabilitation, hospice inpatient, swing bed, and other institutional inpatient stays identified from bill_type_code. If the source date is delivered as text, cast it to a date in YYYY-MM-DD format during mapping. admission_date should be less than or equal to discharge_date.'
        required_for_data_marts: ['claims_enrollment', 'encounters', 'semantic_layer', 'service_categories']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_tuva_chronic_conditions
          - the_tuva_project.expect_column_values_to_be_between:
              description: This is a test on all dates to see if they are within a reasonable range.
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                meta:
                  dqi_test_description: 'This is a test on all dates to see if they are within a reasonable range. '
