      - name: rendering_npi
        description: 'Rendering NPI for the claim, typically representing the practitioner or entity that performed the service. This line-level field may be populated on either institutional or professional claims and may vary across claim lines. An NPI is a 10-digit numeric identifier, and Tuva validates the expected length and character pattern. Some source systems provide only a single NPI field without distinguishing rendering, billing, and facility roles. In that case, use provider data to determine whether the identifier belongs to a person or a place: if it belongs to a person, map it to rendering_npi; if it belongs to a place on an institutional claim, map it to facility_npi instead.'
        mapping_instructions: 'Map the NPI for the practitioner who rendered the service on the claim line. Every claim line should have a rendering_npi. If the source only provides a single NPI field, use provider reference data to determine whether that identifier is a person-level NPI, and map person-level NPIs to rendering_npi. If the source only provides facility or organization NPIs, the mapping should be improved upstream because logical DQ treats missing rendering_npi as a failure.'
        required_for_data_marts: ['cms_hccs', 'encounters', 'hcc_recapture', 'provider_attribution', 'semantic_layer', 'service_categories']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
          - the_tuva_project.expect_column_value_lengths_to_equal:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
              arguments:
                value: 10
          - the_tuva_project.expect_column_values_to_match_regex:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
              arguments:
                regex: ^[0-9]{10}$
                pattern1: '[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]'
          - the_tuva_project.warn_if_null_percentage_is_100:
              description: Percentage of values that are null.
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_5
                  - dqi
        config:
          meta:
            data_type: varchar
      - name: rendering_tin
        description: Rendering provider tax identification number (TIN). This field is a string that contains TIN (Tax Identification Number) information for the practitioner who performed or rendered the specific service and can be different across claim lines.
