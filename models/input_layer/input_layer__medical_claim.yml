      - name: billing_npi
        description: 'Billing NPI for the claim, typically representing the organization or individual responsible for billing and receiving payment for the service. An NPI is a 10-digit numeric identifier, and Tuva validates the expected length and character pattern. Some source systems provide only a single NPI field without distinguishing rendering, billing, and facility roles. In that case, use provider data to determine whether the identifier belongs to a person or a place: if it belongs to a person, map it to rendering_npi and, on professional claims, also consider mapping it to billing_npi; if it belongs to a place on an institutional claim, map it to facility_npi instead.'
        mapping_instructions: 'Map the NPI for the billing entity on the claim. Every claim should have one and only one billing_npi, and the value should be identical across all lines for the same claim_id. If the source only provides a single NPI field, use provider reference data to determine whether the identifier belongs to a billing provider organization or individual.'
        required_for_data_marts: ['encounters', 'semantic_layer']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
          - the_tuva_project.expect_column_value_lengths_to_equal:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
              arguments:
                value: 10
          - the_tuva_project.expect_column_values_to_match_regex:
              config:
                severity: warn
