      - name: total_cost_amount
        description: The total amount paid on the claim by different parties. This field is numeric with two decimal points (e.g. numeric(38,2)) that corresponds to the total amount for a member’s cost of care. Based on the source data set, it may equal the sum of the other payment fields or it may include [Medicare’s claim pass-through per diem amount](https://resdac.org/cms-data/variables/claim-pass-thru-diem-amount). In other words, it is generally expected that allowed_amount = total_cost_amount, except in cases where fields beyond paid_amount, coinsurance_amount, copayment_amount, and deductible_amount are relevant to the total cost of care. In source data that has not yet applied Adjustments, Denials, and Reversals (ADR) logic, these values may be negative. When mapping to the Tuva Project input layer, the expectation is that ADR is handled before the input layer. Most often, this means that negative values are not present when the mapping process is complete.
        mapping_instructions: ''
        required_for_data_marts: ['semantic_layer']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
          - the_tuva_project.expect_column_values_to_be_in_type_list:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
              arguments:
                column_type_list:
                  - number
                  - decimal
                  - numeric
                  - float
                  - float4
                  - float8
                  - double
                  - double precision
                  - real
                  - float64
                  - bignumeric
        config:
          meta:
            data_type: float
      - name: diagnosis_code_type
        description: 'Coding system used for diagnosis codes on the claim. This header-level field must be consistent across all lines for the same claim and should be populated whenever diagnosis codes are present. Allowed values are icd-9-cm and icd-10-cm. If the source does not explicitly provide diagnosis_code_type, a common approach is to infer it from service date: use icd-9-cm for dates before 2015-10-01 and icd-10-cm for dates after 2015-10-01. If the source spans the transition period and omits the code type, infer the value using both the date of service and the diagnosis code pattern.'
        mapping_instructions: 'Populate diagnosis_code_type whenever any diagnosis_code_1 through diagnosis_code_25 is populated. The allowed values are icd-9-cm and icd-10-cm. If the source does not explicitly provide the code type, it can be inferred using the ICD-9 to ICD-10 transition date when appropriate. This is a header-level field and must be identical across all lines for the same claim_id.'
        required_for_data_marts: ['ccsr', 'cms_chronic_conditions', 'cms_hccs', 'encounters', 'tuva_chronic_conditions']
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
