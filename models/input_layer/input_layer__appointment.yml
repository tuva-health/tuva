version: 2
models:
  - name: input_layer__appointment
    description: |-
      The appointment table contains information related to appointments at a healthcare facility. This table may include canceled, completed, or scheduled appointments.
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_input_layer{% else %}input_layer{%- endif -%}
      meta:
        dag:
          node_type: intermediate
        grain: One record per appointment per patient.
        transformation_steps: |-
          This model brings the input layer appointment table into the Tuva package -- it does not do any transformation.
        mapping_instructions: 'No explicit mapping instructions provided.'
      tags: input_layer
      materialized: view
    columns:
      - name: appointment_id
        description: This field is the unique identifier for an appointment within a data source.
        config:
          meta:
            data_type: varchar
            is_primary_key: true
            mapping_instructions: 'No explicit mapping instructions provided.'
        tests:
          - unique:
              config:
                severity: error
          - not_null:
              config:
                severity: error
      - name: person_id
        description: Unique identifier for each person in the dataset.
        config:
          meta:
            data_type: varchar
            mapping_instructions: 'No explicit mapping instructions provided.'
      - name: patient_id
        description: Identifier that links a patient to a particular clinical source system.
        config:
          meta:
            data_type: varchar
            mapping_instructions: 'No explicit mapping instructions provided.'
      - name: encounter_id
        description: Unique identifier for each encounter associated with the appointment.
        config:
          meta:
            data_type: varchar
            mapping_instructions: 'No explicit mapping instructions provided.'
      - name: start_datetime
        description: The scheduled start date and time of the appointment.
        config:
          meta:
            data_type: timestamp
            mapping_instructions: 'No explicit mapping instructions provided.'
      - name: end_datetime
        description: The scheduled end date and time of the appointment.
        config:
          meta:
            data_type: timestamp
            mapping_instructions: 'No explicit mapping instructions provided.'
      - name: duration
        description: The scheduled duration of the appointment in minutes.
        config:
          meta:
            data_type: integer
            mapping_instructions: 'No explicit mapping instructions provided.'
      - name: location_id
        description: Unique identifier for the location where the appointment is scheduled.
        config:
          meta:
            data_type: varchar
            mapping_instructions: 'No explicit mapping instructions provided.'
      - name: practitioner_id
        description: Unique identifier for the practitioner associated with the appointment.
        config:
          meta:
            data_type: varchar
            mapping_instructions: 'No explicit mapping instructions provided.'
      - name: type_code
        description: Source appointment type code, such as a walk-in or routine visit code.
        config:
          meta:
            data_type: varchar
            mapping_instructions: 'No explicit mapping instructions provided.'
      - name: type_description
        description: Human-readable description of the source appointment type.
        config:
          meta:
            data_type: varchar
            mapping_instructions: 'No explicit mapping instructions provided.'
      - name: status_code
        description: Source appointment status code.
        config:
          meta:
            data_type: varchar
            mapping_instructions: 'No explicit mapping instructions provided.'
      - name: status_description
        description: Human-readable description of the source appointment status.
        config:
          meta:
            data_type: varchar
            mapping_instructions: 'No explicit mapping instructions provided.'
      - name: reason
        description: Free-text reason entered for the appointment.
        config:
          meta:
            data_type: varchar
            mapping_instructions: 'No explicit mapping instructions provided.'
      - name: cancellation_reason
        description: Free-text reason the appointment was canceled.
        config:
          meta:
            data_type: varchar
            mapping_instructions: 'No explicit mapping instructions provided.'
      - name: data_source
        description: User-configured field that indicates the data source.
        config:
          meta:
            data_type: varchar
            mapping_instructions: 'No explicit mapping instructions provided.'