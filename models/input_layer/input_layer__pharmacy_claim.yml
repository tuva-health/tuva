version: 2
models:
  - name: input_layer__pharmacy_claim
    description: >-
      The pharmacy_claim table includes information about retail and specialty
      drug prescriptions that have been filled for a patient, billed by a
      pharmacy, and paid by an insurer. Prescriptions that are ordered but not
      filled should not make it into the table. Claim adjustments, denials, and
      reversals should be handled similarly to the medical_claim table.
    tests:
      - dbt_utils.unique_combination_of_columns:
          config:
            severity: error
            enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
            tags:
              - tuva_dqi_sev_1
              - dqi
              - dqi_service_categories
              - dqi_ccsr
              - dqi_cms_chronic_conditions
              - dqi_tuva_chronic_conditions
              - dqi_cms_hccs
              - dqi_ed_classification
              - dqi_financial_pmpm
              - dqi_quality_measures
              - dqi_readmission
          arguments:
            combination_of_columns:
              - claim_id
              - claim_line_number
              - data_source
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_input_layer{% else %}input_layer{%- endif -%}
      tags: input_layer
      materialized: view
      meta:
        grain: Intended to be one record per claim line per data source.
        mapping_instructions: ''
    columns:
      - name: claim_id
        description: Unique identifier for a claim. Each claim represents a distinct healthcare service or set of services provided to a patient. This is a string that links each row in the table to the unique claim to which it belongs. Keep in mind that the pharmacy_claim table is at the claim line grain, i.e. each row in the table corresponds to a unique claim line. If a given claim has N lines, there are N lines in the pharmacy_claim table with the same claim_id value (one for each line in the claim). The claim_id value is required to be populated for every row in the pharmacy_claim table. DQI checks that every row in the pharmacy_claim table has a populated claim_id.
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: error
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_service_categories
                  - dqi_ccsr
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
          - not_null:
              config:
                severity: error
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_service_categories
                  - dqi_ccsr
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
        config:
          meta:
            data_type: varchar
            is_primary_key: true
            mapping_instructions: ''
            required_for_data_marts: ['claims_enrollment', 'cms_chronic_conditions', 'hcc_recapture', 'pharmacy', 'quality_measures', 'semantic_layer']
      - name: claim_line_number
        description: Indicates the line number for the particular line of the claim. This is a positive integer that identifies the claim line that a given row on the table represents. The values of claim_line_number for a given claim_id must be sequential positive integers starting at 1. For example, if claim_id = ABC has 4 claim lines (i.e., 4 rows on the pharmacy_claim table), those 4 rows must have claim_line_number equal to 1, 2, 3, and 4, respectively. The claim_line_number field should be populated for every row in the pharmacy_claim table. Pharmacy claims datasets do not often have a claim_line_number field. In these cases, you can set claim_line_number = 1 for each claim_id. We include claim_line_number in the input layer for pharmacy_claim to handle the case where there may be multiple claim lines per claim_id, and for consistency with medical_claim. DQI checks that the values of claim_line_number are different for all lines within the same claim.
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: error
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_service_categories
                  - dqi_ccsr
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
          - not_null:
              config:
                severity: error
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_service_categories
                  - dqi_ccsr
                  - dqi_cms_chronic_conditions
                  - dqi_tuva_chronic_conditions
                  - dqi_cms_hccs
                  - dqi_ed_classification
                  - dqi_financial_pmpm
                  - dqi_quality_measures
                  - dqi_readmission
        config:
          meta:
            data_type: integer
            is_primary_key: true
            mapping_instructions: ''
            required_for_data_marts: ['claims_enrollment', 'pharmacy', 'semantic_layer']
      - name: person_id
        description: Unique identifier for each person in the dataset. person_id is a required (string) field that ideally contains a person-level UUID (Universally Unique Identifier), if available. This can be populated from the Tuva EMPI Engine or with your own Master Patient Index identifier. If you dont have a UUID, we recommend mapping the source patient identifier to this field (member_id for claims and patient_id for clinical).
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_financial_pmpm
                  - dqi_quality_measures
          - not_null:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_financial_pmpm
                  - dqi_quality_measures
        config:
          meta:
            data_type: varchar
            mapping_instructions: 'Map the unique identifier that represents a single person. The same person should not have multiple person_ids. Every pharmacy claim should have one and only one person_id.'
            required_for_data_marts: ['claims_enrollment', 'cms_chronic_conditions', 'financial_pmpm', 'hcc_recapture', 'hcc_suspecting', 'pharmacy', 'quality_measures', 'semantic_layer']
      - name: member_id
        description: Identifier that links a patient to a particular insurance product or health plan. A patient can have more than one member_id because they can have more than one insurance product/plan. This field is a string that links each row to a given member. This field should be populated for every row in the pharmacy_claim table. It is a header-level field, so its value must be the same for all lines in a given claim.
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
        config:
          meta:
            data_type: varchar
            mapping_instructions: 'Map the member identifier assigned to the person for the specific health plan covering the claim. A person can have multiple member_ids across plans, so member_id does not need to be globally unique to the person. A given pharmacy claim should typically carry one member_id.'
            required_for_data_marts: ['claims_enrollment', 'financial_pmpm', 'pharmacy']
      - name: payer
        description: Name of the payer (i.e. health insurer) providing coverage.
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_financial_pmpm
          - the_tuva_project.warn_if_null_percentage_is_100:
              description: Percentage of values that are null.
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_5
                  - dqi
                  - dqi_financial_pmpm
        config:
          meta:
            data_type: varchar
            mapping_instructions: 'Map the name of the insurer responsible for the pharmacy claim. In many source systems payer effectively matches the data source, so it is acceptable to hard-code a stable payer value when the source represents a single insurer.'
            required_for_data_marts: ['claims_enrollment', 'financial_pmpm', 'hcc_recapture', 'hcc_suspecting', 'semantic_layer']
      - name: plan
        description: Name of the plan (i.e. sub contract) providing coverage. This field is a string that links every row to the the specific health insurance plan or sub-contract specific to a members enrollment (e.g. Aetna Gold, BCBS Chicago, etc). plan values may not come in the source data. This field should be hard-coded if not present.
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_financial_pmpm
          - the_tuva_project.warn_if_null_percentage_is_100:
              description: Percentage of values that are null.
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_5
                  - dqi
                  - dqi_financial_pmpm
        config:
          meta:
            data_type: varchar
            mapping_instructions: 'Map the health plan or product name associated with the pharmacy claim, such as Humana PPO or Humana HMO. If the source does not provide a plan value, it is acceptable to hard-code a stable plan label during mapping.'
            required_for_data_marts: ['claims_enrollment', 'financial_pmpm', 'semantic_layer']
      - name: prescribing_provider_npi
        description: NPI for the provider that wrote the prescription (e.g. primary care physician). This field is a string that contains NPI (National Provider Identifier) values. precribing_provider_npi is populated with the NPI of the provider who prescribed the medication (e.g. primary care physician).
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
          - not_null:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_3
                  - dqi
          - the_tuva_project.expect_column_value_lengths_to_equal:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
              arguments:
                value: 10
          - the_tuva_project.expect_column_values_to_match_regex:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
              arguments:
                regex: ^[0-9]{10}$
                pattern1: '[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]'
        config:
          meta:
            data_type: varchar
            mapping_instructions: 'Map the NPI of the provider who prescribed the medication. Every pharmacy claim should have a prescribing_provider_npi, and the mapped value should be a valid 10-digit NPI that matches the provider table.'
            required_for_data_marts: []
      - name: dispensing_provider_npi
        description: NPI for the provider that dispensed the prescription (e.g. pharmacy). This field is a string that contains NPI (National Provider Identifier) values. dispensing_provider_npi is populated with the NPI of the provider who dispensed the medication. This NPI may represent the pharmacist or the pharmacy.
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
          - not_null:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_3
                  - dqi
          - the_tuva_project.expect_column_value_lengths_to_equal:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
              arguments:
                value: 10
          - the_tuva_project.expect_column_values_to_match_regex:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
              arguments:
                regex: ^[0-9]{10}$
                pattern1: '[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]'
        config:
          meta:
            data_type: varchar
            mapping_instructions: 'Map the NPI of the provider or pharmacy that dispensed the medication. Every pharmacy claim should have a dispensing_provider_npi, and the mapped value should be a valid 10-digit NPI that matches the provider table.'
            required_for_data_marts: []
      - name: dispensing_date
        description: Date the medication was dispensed. This field is a date that corresponds to the date a medication was given to the patient. This may also be denoted as fill_date depending on the data source.
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_financial_pmpm
                  - dqi_quality_measures
          - not_null:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_financial_pmpm
                  - dqi_quality_measures
          - the_tuva_project.expect_column_values_to_be_of_type:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_financial_pmpm
                  - dqi_quality_measures
              arguments:
                column_type: date
          - the_tuva_project.expect_column_values_to_be_between:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_4
                  - dqi
                  - dqi_financial_pmpm
                  - dqi_quality_measures
              arguments:
                min_value: '''1900-01-01'''
                max_value: '''2100-01-01'''
                strictly: false
          - the_tuva_project.warn_if_null_percentage_is_100:
              description: Percentage of values that are null.
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_5
                  - dqi
                  - dqi_financial_pmpm
                  - dqi_quality_measures
        config:
          meta:
            data_type: date
            mapping_instructions: 'Map the date the medication was dispensed. Cast source text or timestamps to a date in YYYY-MM-DD format during mapping. Every pharmacy claim should have a dispensing_date.'
            required_for_data_marts: ['financial_pmpm', 'hcc_suspecting', 'pharmacy', 'quality_measures', 'semantic_layer']
      - name: ndc_code
        description: 'National Drug Code (NDC) for the medication dispensed on the pharmacy claim line. Each pharmacy claim line should have an ndc_code. NDCs are often shown on packaging as 10-digit codes, but pharmacy claims typically require the 11-digit billing format. If your source data contains 10-digit NDCs, convert them to 11 digits before mapping. The 11-digit format follows a 5-4-2 pattern; when converting from a dashed 10-digit format, add a leading zero to the segment that is short. If the source stores a 10-digit NDC without dashes or segment boundaries, you generally cannot determine where the extra zero belongs reliably. Remove dashes before mapping. Tuva expects this field to be populated with an 11-character string, but downstream validation determines whether the mapped value is a valid terminology code.'
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_quality_measures
          - not_null:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_quality_measures
        config:
          meta:
            data_type: varchar
            mapping_instructions: 'Map the NDC for the medication that was dispensed. Every pharmacy claim line should have an ndc_code. Normalize 10-digit source NDCs to the 11-digit billing format, remove dashes, and make sure the final mapped value is valid against Tuva terminology.'
            required_for_data_marts: ['cms_chronic_conditions', 'hcc_suspecting', 'pharmacy', 'quality_measures', 'semantic_layer']
      - name: quantity
        description: The quantity of the medication. This field is a positive integer that represents the number of doses of the medication. Before the application of Adjustments, Denials, and Reversals (ADR), quantity may be represented as a negative value on some claim lines, but appropriately handing ADR should result in only positive integer values.
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
          - the_tuva_project.warn_if_null_percentage_is_100:
              description: Percentage of values that are null.
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_5
                  - dqi
        config:
          meta:
            data_type: integer
            mapping_instructions: ''
            required_for_data_marts: ['pharmacy', 'semantic_layer']
      - name: days_supply
        description: The number of days supply included. This field is a positive integer that represents the number of days supply for the medication. Before the application of Adjustments, Denials, and Reversals (ADR), days_supply may be represented as a negative value on some claim lines, but appropriately handing ADR should result in only positive integer values.
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_quality_measures
          - not_null:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_quality_measures
        config:
          meta:
            data_type: integer
            mapping_instructions: ''
            required_for_data_marts: ['pharmacy', 'quality_measures', 'semantic_layer']
      - name: refills
        description: Number of refills for the prescription. This field is a positive integer that represents the number of refills for the prescription. Before the application of Adjustments, Denials, and Reversals (ADR), refills may be represented as negative values on some claim lines, but appropriately handing ADR should result in only positive integer values.
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
        config:
          meta:
            data_type: integer
            mapping_instructions: ''
            required_for_data_marts: ['pharmacy']
      - name: paid_date
        description: The date the claim was paid. This field is a date that corresponds to when the health insurer processed the claim for payment, and in the context of pharmacy claims should coincide with the date the pharmacy received reimbursement from the health insurer.
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_financial_pmpm
                  - dqi_quality_measures
          - not_null:
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_3
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_financial_pmpm
                  - dqi_quality_measures
          - the_tuva_project.expect_column_values_to_be_of_type:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_financial_pmpm
                  - dqi_quality_measures
              arguments:
                column_type: date
          - the_tuva_project.warn_if_null_percentage_is_100:
              description: Percentage of values that are null.
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_cms_chronic_conditions
                  - dqi_financial_pmpm
                  - dqi_quality_measures
          - the_tuva_project.expect_column_values_to_be_between:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_4
                  - dqi
              arguments:
                min_value: '''1900-01-01'''
                max_value: '''2100-01-01'''
                strictly: false
        config:
          meta:
            data_type: date
            mapping_instructions: 'Map the date the pharmacy claim was paid. Cast source text or timestamps to a date in YYYY-MM-DD format during mapping. Every pharmacy claim should have a paid_date.'
            required_for_data_marts: ['claims_enrollment', 'cms_chronic_conditions', 'financial_pmpm', 'hcc_suspecting', 'pharmacy', 'quality_measures', 'semantic_layer']
      - name: paid_amount
        description: The total amount paid by the insurer. This field is numeric with two decimal points (e.g. numeric(38,2)) that corresponds to the dollar amount paid by the health insurer for the covered medication. In source data that has not yet applied Adjustments, Denials, and Reversals (ADR) logic, these values may be negative. When mapping to the Tuva Project input layer, the expectation is that ADR is handled before the input layer. Most often, this means that negative values are not present when the mapping process is complete.
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
                  - dqi_financial_pmpm
          - the_tuva_project.expect_column_values_to_be_in_type_list:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_financial_pmpm
              arguments:
                column_type_list:
                  - number
                  - decimal
                  - numeric
                  - float
                  - float4
                  - float8
                  - double
                  - double precision
                  - real
                  - float64
                  - bignumeric
          - the_tuva_project.warn_if_null_percentage_is_100:
              description: Percentage of values that are null.
              config:
                severity: warn
                enabled: '{{ var(''enable_input_layer_testing'', true) | as_bool }}'
                tags:
                  - tuva_dqi_sev_2
                  - dqi
                  - dqi_financial_pmpm
        config:
          meta:
            data_type: float
            mapping_instructions: 'Map the final insurer-paid amount after any source-level Adjustments, Denials, and Reversals logic has been applied. Temporary negative values may exist upstream before ADR is resolved, but the final mapped paid_amount in the input layer should be greater than zero.'
            required_for_data_marts: ['financial_pmpm', 'pharmacy', 'semantic_layer']
      - name: allowed_amount
        description: The total amount allowed (includes amount paid by the insurer and patient). This field is numeric with two decimal points (e.g. numeric(38,2)) that corresponds to the total amount allowed for a medication, including dollars paid by both the payer and the patient. In source data that has not yet applied Adjustments, Denials, and Reversals (ADR) logic, these values may be negative. When mapping to the Tuva Project input layer, the expectation is that ADR is handled before the input layer. Most often, this means that negative values are not present when the mapping process is complete. The expectation is that the sum of paid_amount, coinsurance_amount, copayment_amount, and deductible_amount will be equivalent to allowed_amount.
        tests:
          - the_tuva_project.expect_column_to_exist:
              config:
                severity: warn
                enabled: '{{ (var(''enable_input_layer_testing'', true)) | as_bool }}'
                tags:
                  - tuva_dqi_sev_1
                  - dqi
