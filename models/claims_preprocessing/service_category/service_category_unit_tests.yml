version: 2

unit_tests:

  # =========================================================================
  # STAGING MODELS
  # =========================================================================

  # -------------------------------------------------------------------------
  # service_category__stg_professional
  # -------------------------------------------------------------------------

  - name: test_sc_stg_professional_filters_professional_claims
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: service_category__stg_professional
    description: >
      Only claims with claim_type = 'professional' pass through.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('service_category__stg_medical_claim')
        rows:
          - {claim_id: 'C1', claim_line_number: 1, claim_line_id: 'C1|1', claim_type: 'professional', data_source: 'src1'}
          - {claim_id: 'C2', claim_line_number: 1, claim_line_id: 'C2|1', claim_type: 'institutional', data_source: 'src1'}
    expect:
      rows:
        - {claim_id: 'C1', claim_line_number: 1, claim_line_id: 'C1|1', service_type: 'professional', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}

  # -------------------------------------------------------------------------
  # service_category__stg_outpatient_institutional
  # -------------------------------------------------------------------------

  - name: test_sc_stg_outpatient_institutional_excludes_inpatient
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: service_category__stg_outpatient_institutional
    description: >
      Institutional claims not classified as inpatient are outpatient.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('service_category__stg_medical_claim')
        rows:
          - {claim_id: 'C1', claim_type: 'institutional', data_source: 'src1'}
          - {claim_id: 'C2', claim_type: 'institutional', data_source: 'src1'}
          - {claim_id: 'C3', claim_type: 'professional', data_source: 'src1'}
      - input: ref('service_category__stg_inpatient_institutional')
        rows:
          - {claim_id: 'C1', data_source: 'src1', service_type: 'inpatient', tuva_last_run: '2024-01-01 00:00:00'}
    expect:
      rows:
        - {claim_id: 'C2', data_source: 'src1', service_type: 'outpatient', tuva_last_run: '2024-01-01 00:00:00'}

  # -------------------------------------------------------------------------
  # service_category__stg_office_based
  # -------------------------------------------------------------------------

  - name: test_sc_stg_office_based_filters_by_pos
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: service_category__stg_office_based
    description: >
      Professional claims with place_of_service_code 11, 02, or 10 are
      classified as office-based.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('service_category__stg_medical_claim')
        rows:
          - {claim_id: 'C1', claim_line_number: 1, claim_line_id: 'C1|1', claim_type: 'professional', place_of_service_code: '11', data_source: 'src1'}
          - {claim_id: 'C2', claim_line_number: 1, claim_line_id: 'C2|1', claim_type: 'professional', place_of_service_code: '02', data_source: 'src1'}
          - {claim_id: 'C3', claim_line_number: 1, claim_line_id: 'C3|1', claim_type: 'professional', place_of_service_code: '23', data_source: 'src1'}
      - input: ref('service_category__stg_professional')
        rows:
          - {claim_id: 'C1', claim_line_number: 1, claim_line_id: 'C1|1', data_source: 'src1', service_type: 'professional', tuva_last_run: '2024-01-01 00:00:00'}
          - {claim_id: 'C2', claim_line_number: 1, claim_line_id: 'C2|1', data_source: 'src1', service_type: 'professional', tuva_last_run: '2024-01-01 00:00:00'}
          - {claim_id: 'C3', claim_line_number: 1, claim_line_id: 'C3|1', data_source: 'src1', service_type: 'professional', tuva_last_run: '2024-01-01 00:00:00'}
    expect:
      rows:
        - {claim_id: 'C1', claim_line_number: 1, claim_line_id: 'C1|1', service_type: 'office based', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
        - {claim_id: 'C2', claim_line_number: 1, claim_line_id: 'C2|1', service_type: 'office based', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}

