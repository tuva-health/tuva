    model: service_category__acute_inpatient_professional
    description: >
      Professional claims with place_of_service_code = '21' are classified
      as acute inpatient. HCPCS codes determine delivery type.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('service_category__stg_medical_claim')
        rows:
          - {claim_id: 'C1', claim_line_number: 1, claim_line_id: 'C1|1', claim_type: 'professional', place_of_service_code: '21', hcpcs_code: '99213', data_source: 'src1'}
          - {claim_id: 'C2', claim_line_number: 1, claim_line_id: 'C2|1', claim_type: 'professional', place_of_service_code: '21', hcpcs_code: '59400', data_source: 'src1'}
