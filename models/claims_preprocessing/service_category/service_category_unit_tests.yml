    expect:
      rows:
        - {claim_id: 'C1', claim_line_number: 1, data_source: 'src1', claim_line_id: 'C1|1', service_category_1: 'inpatient', service_category_2: 'acute inpatient', service_category_3: 'acute inpatient - other', tuva_last_run: '2024-01-01 00:00:00'}
        - {claim_id: 'C2', claim_line_number: 1, data_source: 'src1', claim_line_id: 'C2|1', service_category_1: 'inpatient', service_category_2: 'acute inpatient', service_category_3: 'l/d - vaginal delivery', tuva_last_run: '2024-01-01 00:00:00'}

