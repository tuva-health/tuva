          - {encounter_id: 1, start_date: '2023-01-01', end_date: '2023-01-05'}
          - {encounter_id: 1, start_date: '2023-01-02', end_date: '2023-01-07'}
          - {encounter_id: 2, start_date: '2023-02-01', end_date: '2023-02-03'}
    expect:
      rows:
        - {encounter_id: 1, encounter_start_date: '2023-01-01', encounter_end_date: '2023-01-07'}
        - {encounter_id: 2, encounter_start_date: '2023-02-01', encounter_end_date: '2023-02-03'}

