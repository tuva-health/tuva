version: 2

unit_tests:

  # =========================================================================
  # STAGING MODELS
  # =========================================================================

  # -------------------------------------------------------------------------
  # encounters__patient_data_source_id
  # -------------------------------------------------------------------------

  - name: test_patient_data_source_id_assigns_ids
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: encounters__patient_data_source_id
    description: >
      Assigns a dense_rank patient_data_source_id per unique
      person_id + data_source combination from medical claims and eligibility.
    given:
      - input: ref('normalized_input__medical_claim')
        rows:
          - {person_id: 'P1', data_source: 'src1'}
          - {person_id: 'P2', data_source: 'src1'}
      - input: ref('normalized_input__eligibility')
        rows:
          - {person_id: 'P1', data_source: 'src1'}
          - {person_id: 'P3', data_source: 'src1'}
    expect:
      rows:
        - {person_id: 'P1', data_source: 'src1'}
        - {person_id: 'P2', data_source: 'src1'}
        - {person_id: 'P3', data_source: 'src1'}

  # -------------------------------------------------------------------------
  # encounters__stg_eligibility
  # -------------------------------------------------------------------------

  - name: test_stg_eligibility_row_numbering
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: encounters__stg_eligibility
    description: >
      Patient eligibility rows are numbered by enrollment_start_date desc,
      so the most recent enrollment gets patient_row_num = 1.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('normalized_input__eligibility')
        rows:
          - {person_id: 'P1', birth_date: '1960-01-01', gender: 'male', race: 'white', enrollment_start_date: '2022-01-01', data_source: 'src1'}
          - {person_id: 'P1', birth_date: '1960-01-01', gender: 'male', race: 'white', enrollment_start_date: '2023-06-01', data_source: 'src1'}
      - input: ref('encounters__patient_data_source_id')
        rows:
          - {person_id: 'P1', data_source: 'src1', patient_data_source_id: 1}
    expect:
      rows:
        - {person_id: 'P1', birth_date: '1960-01-01', gender: 'male', race: 'white', patient_data_source_id: 1, patient_row_num: 1, tuva_last_run: '2024-01-01 00:00:00'}
        - {person_id: 'P1', birth_date: '1960-01-01', gender: 'male', race: 'white', patient_data_source_id: 1, patient_row_num: 2, tuva_last_run: '2024-01-01 00:00:00'}

  # -------------------------------------------------------------------------
  # encounters__stg_inpatient_institutional
  # -------------------------------------------------------------------------

  - name: test_stg_inpatient_institutional_passthrough
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: encounters__stg_inpatient_institutional
    description: >
      Passes through claim_id and service_type from the upstream
      stg_inpatient_institutional model.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('service_category__stg_inpatient_institutional')
        rows:
          - {claim_id: 'C1', data_source: 'src1', service_type: 'inpatient', tuva_last_run: '2024-01-01 00:00:00'}
    expect:
      rows:
        - {claim_id: 'C1', service_type: 'inpatient', tuva_last_run: '2024-01-01 00:00:00'}

  # -------------------------------------------------------------------------
  # encounters__stg_outpatient_institutional
  # -------------------------------------------------------------------------

  - name: test_stg_outpatient_institutional_passthrough
