  # -------------------------------------------------------------------------
  # encounters__stg_professional
  # -------------------------------------------------------------------------

  - name: test_stg_professional_passthrough
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: encounters__stg_professional
    description: >
      Passes through claim_id, claim_line_number, claim_line_id, service_type,
      and data_source from the upstream stg_professional model.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('service_category__stg_professional')
        rows:
          - {claim_id: 'C1', claim_line_number: 1, claim_line_id: 'C1|1', data_source: 'src1', service_type: 'professional', tuva_last_run: '2024-01-01 00:00:00'}
    expect:
      rows:
        - {claim_id: 'C1', claim_line_number: 1, claim_line_id: 'C1|1', service_type: 'professional', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}

  # -------------------------------------------------------------------------
  # encounters__prof_and_lower_priority
  # -------------------------------------------------------------------------

  - name: test_prof_and_lower_priority_unions_sources
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: encounters__prof_and_lower_priority
    description: >
      Unions professional claims with lower-priority institutional claims
      (lab, dme, ambulance) from the service_category grouper.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('encounters__stg_professional')
        rows:
          - {claim_id: 'PROF1', claim_line_number: 1, data_source: 'src1'}
      - input: ref('service_category__service_category_grouper')
        rows:
          - {claim_id: 'INST1', claim_line_number: 1, data_source: 'src1', duplicate_row_number: 1, service_category_2: 'lab'}
          - {claim_id: 'INST2', claim_line_number: 1, data_source: 'src1', duplicate_row_number: 1, service_category_2: 'durable medical equipment'}
          - {claim_id: 'INST3', claim_line_number: 1, data_source: 'src1', duplicate_row_number: 1, service_category_2: 'ambulance'}
          - {claim_id: 'INST4', claim_line_number: 1, data_source: 'src1', duplicate_row_number: 1, service_category_2: 'acute inpatient'}
          - {claim_id: 'INST5', claim_line_number: 1, data_source: 'src1', duplicate_row_number: 2, service_category_2: 'lab'}
    expect:
      rows:
        - {claim_id: 'PROF1', claim_line_number: 1, data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
        - {claim_id: 'INST1', claim_line_number: 1, data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
        - {claim_id: 'INST2', claim_line_number: 1, data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
        - {claim_id: 'INST3', claim_line_number: 1, data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}

