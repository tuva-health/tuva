      - input: ref('encounters__stg_medical_claim')
        rows:
          - {claim_id: 'ORPH1', claim_line_number: 1, service_category_1: 'other', service_category_2: 'other', service_category_3: 'other', claim_type: 'professional', claim_start_date: '2023-01-01', claim_end_date: '2023-01-01', start_date: '2023-01-01', end_date: '2023-01-01', patient_data_source_id: 1}
          - {claim_id: 'MATCHED1', claim_line_number: 1, service_category_1: 'inpatient', service_category_2: 'acute inpatient', service_category_3: 'medical', claim_type: 'institutional', claim_start_date: '2023-01-01', claim_end_date: '2023-01-05', start_date: '2023-01-01', end_date: '2023-01-05', patient_data_source_id: 1}
      - input: ref('encounters__combined_claim_line_crosswalk')
        rows:
