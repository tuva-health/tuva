    given:
      - input: ref('encounters__stg_medical_claim')
        rows:
          - {claim_id: 'ED1', patient_data_source_id: 1, start_date: '2023-01-01', end_date: '2023-01-01', service_category_2: 'emergency department', facility_npi: 'NPI1', discharge_disposition_code: null, claim_type: 'institutional'}
