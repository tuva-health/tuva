version: 2

unit_tests:

  # =========================================================================
  # STAGING MODELS
  # =========================================================================

  # -------------------------------------------------------------------------
  # encounters__stg_medical_claim
  # -------------------------------------------------------------------------

  - name: test_gap_stg_medical_claim_joins_service_category
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: encounters__stg_medical_claim
    description: >
      Joins medical claims to service category grouper and patient_data_source_id,
      producing enriched claim lines with service category and patient identifiers.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('normalized_input__medical_claim')
        rows:
          - {person_id: 'P1', claim_id: 'C1', claim_line_number: 1, claim_type: 'professional', admission_date: null, discharge_date: null, claim_start_date: '2023-01-01', claim_end_date: '2023-01-01', claim_line_start_date: '2023-01-01', claim_line_end_date: '2023-01-01', bill_type_code: null, hcpcs_code: '99213', hcpcs_modifier_1: null, hcpcs_modifier_2: null, hcpcs_modifier_3: null, hcpcs_modifier_4: null, hcpcs_modifier_5: null, drg_code_type: null, drg_code: null, admit_source_code: null, admit_type_code: null, place_of_service_code: '11', revenue_center_code: null, diagnosis_code_type: 'icd-10-cm', diagnosis_code_1: 'J06.9', billing_npi: 'NPI1', rendering_npi: 'NPI2', facility_npi: 'NPI3', discharge_disposition_code: null, paid_amount: 100.00, charge_amount: 150.00, allowed_amount: 120.00, data_source: 'src1'}
      - input: ref('service_category__service_category_grouper')
        rows:
          - {claim_id: 'C1', claim_line_number: 1, duplicate_row_number: 1, service_category_1: 'office-based', service_category_2: 'office-based visit', service_category_3: 'office-based visit', data_source: 'src1'}
      - input: ref('encounters__patient_data_source_id')
        rows:
          - {person_id: 'P1', data_source: 'src1', patient_data_source_id: 1}
      - input: ref('ccsr__dxccsr_v2023_1_cleaned_map')
        rows: []
      - input: ref('terminology__provider')
        rows: []
      - input: ref('terminology__nitos')
        rows: []
      - input: ref('terminology__ms_drg')
        rows: []
      - input: ref('terminology__apr_drg')
        rows: []
      - input: ref('terminology__revenue_center')
        rows: []
      - input: ref('terminology__place_of_service')
        rows: []
      - input: ref('terminology__bill_type')
        rows: []
      - input: ref('terminology__ccs_services_procedures')
        rows: []
    expect:
      rows:
        - {person_id: 'P1', patient_data_source_id: 1, claim_id: 'C1', claim_line_number: 1, claim_type: 'professional', service_category_1: 'office-based', service_category_2: 'office-based visit', service_category_3: 'office-based visit', paid_amount: 100.00, data_source: 'src1'}

  - name: test_gap_stg_medical_claim_ignores_lower_priority_service_category_rows
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: encounters__stg_medical_claim
    description: >
      The join to service_category__service_category_grouper should only keep
      duplicate_row_number = 1 so a single claim line does not fan out.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('normalized_input__medical_claim')
        rows:
          - {person_id: 'P1', claim_id: 'C1', claim_line_number: 1, claim_type: 'professional', admission_date: null, discharge_date: null, claim_start_date: '2023-01-01', claim_end_date: '2023-01-01', claim_line_start_date: '2023-01-01', claim_line_end_date: '2023-01-01', bill_type_code: null, hcpcs_code: '99213', drg_code_type: null, drg_code: null, admit_source_code: null, admit_type_code: null, place_of_service_code: '11', revenue_center_code: null, diagnosis_code_type: 'icd-10-cm', diagnosis_code_1: 'J06.9', billing_npi: 'NPI1', rendering_npi: 'NPI2', facility_npi: 'NPI3', discharge_disposition_code: null, paid_amount: 100.00, charge_amount: 150.00, allowed_amount: 120.00, data_source: 'src1'}
      - input: ref('service_category__service_category_grouper')
        rows:
          - {claim_id: 'C1', claim_line_number: 1, data_source: 'src1', duplicate_row_number: 1, service_category_1: 'office-based', service_category_2: 'office-based visit', service_category_3: 'office-based visit'}
          - {claim_id: 'C1', claim_line_number: 1, data_source: 'src1', duplicate_row_number: 2, service_category_1: 'outpatient', service_category_2: 'emergency department', service_category_3: 'emergency department'}
      - input: ref('encounters__patient_data_source_id')
        rows:
          - {person_id: 'P1', data_source: 'src1', patient_data_source_id: 1}
      - input: ref('ccsr__dxccsr_v2023_1_cleaned_map')
        rows: []
      - input: ref('terminology__provider')
        rows: []
      - input: ref('terminology__nitos')
        rows: []
      - input: ref('terminology__ms_drg')
        rows: []
      - input: ref('terminology__apr_drg')
        rows: []
      - input: ref('terminology__revenue_center')
        rows: []
      - input: ref('terminology__place_of_service')
        rows: []
      - input: ref('terminology__bill_type')
        rows: []
      - input: ref('terminology__ccs_services_procedures')
        rows: []
    expect:
      rows:
        - {person_id: 'P1', patient_data_source_id: 1, claim_id: 'C1', claim_line_number: 1, claim_line_id: 'C1|1', claim_type: 'professional', service_category_1: 'office-based', service_category_2: 'office-based visit', service_category_3: 'office-based visit', paid_amount: 100.00, data_source: 'src1'}

