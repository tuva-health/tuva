version: 2

unit_tests:

  # =========================================================================
  # READMISSIONS - INTERMEDIATE: encounter_with_ccs
  # =========================================================================

  - name: test_readmissions_encounter_with_ccs_maps_diagnosis
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: readmissions__encounter_with_ccs
    description: "Encounter with CCS maps primary diagnosis to CCS category and validates code"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('readmissions__encounter')
        rows:
          - {encounter_id: 'E1', person_id: 'P1', admit_date: '2023-06-01', discharge_date: '2023-06-05', discharge_disposition_code: '01', facility_npi: 'NPI1', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 15000, primary_diagnosis_code: 'S72.001A', encounter_source_type: 'claims', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
      - input: ref('terminology__icd_10_cm')
        rows:
          - {icd_10_cm: 'S72.001A'}
      - input: ref('readmissions__icd_10_cm_to_ccs')
        rows:
          - {icd_10_cm: 'S72.001A', ccs_diagnosis_category: '226'}
    expect:
      rows:
        - {encounter_id: 'E1', primary_diagnosis_code: 'S72.001A', valid_primary_diagnosis_code_flag: 1, ccs_diagnosis_category: '226', tuva_last_run: '2024-01-01 00:00:00'}

  - name: test_readmissions_encounter_with_ccs_invalid_diagnosis
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: readmissions__encounter_with_ccs
    description: "Encounter with unrecognized ICD-10-CM code gets valid_primary_diagnosis_code_flag=0 and null CCS"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('readmissions__encounter')
        rows:
          - {encounter_id: 'E1', person_id: 'P1', admit_date: '2023-06-01', discharge_date: '2023-06-05', discharge_disposition_code: '01', facility_npi: 'NPI1', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 15000, primary_diagnosis_code: 'INVALID', encounter_source_type: 'claims', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
      - input: ref('terminology__icd_10_cm')
        rows:
          - {icd_10_cm: 'S72.001A'}
      - input: ref('readmissions__icd_10_cm_to_ccs')
        rows:
          - {icd_10_cm: 'S72.001A', ccs_diagnosis_category: '226'}
    expect:
      rows:
        - {encounter_id: 'E1', primary_diagnosis_code: 'INVALID', valid_primary_diagnosis_code_flag: 0, ccs_diagnosis_category: null, tuva_last_run: '2024-01-01 00:00:00'}

  - name: test_readmissions_encounter_with_ccs_null_diagnosis
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: readmissions__encounter_with_ccs
    description: "Encounter with null primary diagnosis code gets valid flag=0 and null CCS"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('readmissions__encounter')
        rows:
          - {encounter_id: 'E1', person_id: 'P1', admit_date: '2023-06-01', discharge_date: '2023-06-05', discharge_disposition_code: '01', facility_npi: 'NPI1', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 15000, primary_diagnosis_code: null, encounter_source_type: 'claims', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
      - input: ref('terminology__icd_10_cm')
        rows: []
      - input: ref('readmissions__icd_10_cm_to_ccs')
        rows: []
    expect:
      rows:
        - {encounter_id: 'E1', primary_diagnosis_code: null, valid_primary_diagnosis_code_flag: 0, ccs_diagnosis_category: null, tuva_last_run: '2024-01-01 00:00:00'}

  # =========================================================================
  # READMISSIONS - INTERMEDIATE: index_discharge_requirement
  # =========================================================================

  - name: test_readmissions_index_discharge_excludes_invalid_codes
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: readmissions__index_discharge_requirement
    description: "Encounters with discharge_disposition_code 02 (transfer), 07 (AMA), or 20 (died) are excluded from index admissions"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('readmissions__encounter')
        rows:
          - {encounter_id: 'E1', person_id: 'P1', admit_date: '2023-06-01', discharge_date: '2023-06-05', discharge_disposition_code: '01', facility_npi: 'NPI1', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 15000, primary_diagnosis_code: 'S72.001A', encounter_source_type: 'claims', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
          - {encounter_id: 'E2', person_id: 'P2', admit_date: '2023-06-01', discharge_date: '2023-06-03', discharge_disposition_code: '02', facility_npi: 'NPI2', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 10000, primary_diagnosis_code: 'I21.0', encounter_source_type: 'claims', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
          - {encounter_id: 'E3', person_id: 'P3', admit_date: '2023-06-01', discharge_date: '2023-06-02', discharge_disposition_code: '07', facility_npi: 'NPI3', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 5000, primary_diagnosis_code: 'J18.9', encounter_source_type: 'claims', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
          - {encounter_id: 'E4', person_id: 'P4', admit_date: '2023-06-01', discharge_date: '2023-06-10', discharge_disposition_code: '20', facility_npi: 'NPI4', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 25000, primary_diagnosis_code: 'I50.9', encounter_source_type: 'claims', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
    expect:
      rows:
        - {encounter_id: 'E1', tuva_last_run: '2024-01-01 00:00:00'}

  - name: test_readmissions_index_discharge_allows_other_codes
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: readmissions__index_discharge_requirement
    description: "Encounters with valid discharge disposition codes other than 02, 07, 20 pass through"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('readmissions__encounter')
        rows:
          - {encounter_id: 'E1', person_id: 'P1', admit_date: '2023-06-01', discharge_date: '2023-06-05', discharge_disposition_code: '01', facility_npi: 'NPI1', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 15000, primary_diagnosis_code: 'S72.001A', encounter_source_type: 'claims', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
          - {encounter_id: 'E2', person_id: 'P2', admit_date: '2023-06-01', discharge_date: '2023-06-03', discharge_disposition_code: '06', facility_npi: 'NPI2', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 10000, primary_diagnosis_code: 'I21.0', encounter_source_type: 'claims', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
          - {encounter_id: 'E3', person_id: 'P3', admit_date: '2023-06-01', discharge_date: '2023-06-02', discharge_disposition_code: null, facility_npi: 'NPI3', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 5000, primary_diagnosis_code: 'J18.9', encounter_source_type: 'claims', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
    expect:
      rows:
        - {encounter_id: 'E1', tuva_last_run: '2024-01-01 00:00:00'}
        - {encounter_id: 'E2', tuva_last_run: '2024-01-01 00:00:00'}
        - {encounter_id: 'E3', tuva_last_run: '2024-01-01 00:00:00'}

  # =========================================================================
  # READMISSIONS - INTERMEDIATE: index_time_requirement
  # =========================================================================

  - name: test_readmissions_index_time_requirement_30_day_buffer
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: readmissions__index_time_requirement
    description: "Encounters discharged within 30 days of the max discharge date are excluded"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('readmissions__encounter')
        rows:
          - {encounter_id: 'E1', person_id: 'P1', admit_date: '2023-06-01', discharge_date: '2023-06-05', discharge_disposition_code: '01', facility_npi: 'NPI1', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 15000, primary_diagnosis_code: 'S72.001A', encounter_source_type: 'claims', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
          - {encounter_id: 'E2', person_id: 'P2', admit_date: '2023-12-15', discharge_date: '2023-12-20', discharge_disposition_code: '01', facility_npi: 'NPI2', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 10000, primary_diagnosis_code: 'I21.0', encounter_source_type: 'claims', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
    expect:
      rows:
        - {encounter_id: 'E1', tuva_last_run: '2024-01-01 00:00:00'}

  - name: test_readmissions_index_time_requirement_exactly_30_days
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: readmissions__index_time_requirement
    description: "Encounter discharged exactly 30 days before max qualifies for index time requirement"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('readmissions__encounter')
        rows:
          - {encounter_id: 'E1', person_id: 'P1', admit_date: '2023-11-01', discharge_date: '2023-11-20', discharge_disposition_code: '01', facility_npi: 'NPI1', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 15000, primary_diagnosis_code: 'S72.001A', encounter_source_type: 'claims', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
          - {encounter_id: 'E2', person_id: 'P2', admit_date: '2023-12-01', discharge_date: '2023-12-20', discharge_disposition_code: '01', facility_npi: 'NPI2', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 10000, primary_diagnosis_code: 'I21.0', encounter_source_type: 'claims', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
    expect:
      rows:
        - {encounter_id: 'E1', tuva_last_run: '2024-01-01 00:00:00'}

  - name: test_readmissions_index_time_requirement_29_days_excluded
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: readmissions__index_time_requirement
    description: "Encounter discharged only 29 days before the max is excluded from time requirement"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('readmissions__encounter')
        rows:
          - {encounter_id: 'E1', person_id: 'P1', admit_date: '2023-11-01', discharge_date: '2023-11-22', discharge_disposition_code: '01', facility_npi: 'NPI1', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 15000, primary_diagnosis_code: 'S72.001A', encounter_source_type: 'claims', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
          - {encounter_id: 'E2', person_id: 'P2', admit_date: '2023-12-01', discharge_date: '2023-12-21', discharge_disposition_code: '01', facility_npi: 'NPI2', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 10000, primary_diagnosis_code: 'I21.0', encounter_source_type: 'claims', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
    expect:
      rows: []

  # =========================================================================
  # READMISSIONS - INTERMEDIATE: index_admission
  # =========================================================================

  - name: test_readmissions_index_admission_requires_all_criteria
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: readmissions__index_admission
    description: "Index admissions require passing time, discharge, and not having an exclusion"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('readmissions__encounter')
        rows:
          - {encounter_id: 'E1', person_id: 'P1', admit_date: '2023-06-01', discharge_date: '2023-06-05', discharge_disposition_code: '01', facility_npi: 'NPI1', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 15000, primary_diagnosis_code: 'S72.001A', encounter_source_type: 'claims', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
          - {encounter_id: 'E2', person_id: 'P2', admit_date: '2023-06-01', discharge_date: '2023-06-03', discharge_disposition_code: '01', facility_npi: 'NPI2', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 10000, primary_diagnosis_code: 'I21.0', encounter_source_type: 'claims', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
      - input: ref('readmissions__index_time_requirement')
        rows:
          - {encounter_id: 'E1', tuva_last_run: '2024-01-01 00:00:00'}
      - input: ref('readmissions__index_discharge_requirement')
        rows:
          - {encounter_id: 'E1', tuva_last_run: '2024-01-01 00:00:00'}
          - {encounter_id: 'E2', tuva_last_run: '2024-01-01 00:00:00'}
      - input: ref('readmissions__exclusion')
        rows: []
    expect:
      rows:
        - {encounter_id: 'E1', tuva_last_run: '2024-01-01 00:00:00'}

  - name: test_readmissions_index_admission_excluded_by_exclusion
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: readmissions__index_admission
    description: "Encounter meeting time and discharge requirements is excluded when in exclusion list"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('readmissions__encounter')
        rows:
          - {encounter_id: 'E1', person_id: 'P1', admit_date: '2023-06-01', discharge_date: '2023-06-05', discharge_disposition_code: '01', facility_npi: 'NPI1', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 15000, primary_diagnosis_code: 'C50.9', encounter_source_type: 'claims', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
      - input: ref('readmissions__index_time_requirement')
        rows:
          - {encounter_id: 'E1', tuva_last_run: '2024-01-01 00:00:00'}
      - input: ref('readmissions__index_discharge_requirement')
        rows:
          - {encounter_id: 'E1', tuva_last_run: '2024-01-01 00:00:00'}
      - input: ref('readmissions__exclusion')
        rows:
          - {encounter_id: 'E1', tuva_last_run: '2024-01-01 00:00:00'}
    expect:
      rows: []

  - name: test_readmissions_index_admission_fails_time_requirement
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: readmissions__index_admission
    description: "Encounter meeting discharge but not time requirement is excluded from index admissions"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('readmissions__encounter')
        rows:
          - {encounter_id: 'E1', person_id: 'P1', admit_date: '2023-06-01', discharge_date: '2023-06-05', discharge_disposition_code: '01', facility_npi: 'NPI1', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 15000, primary_diagnosis_code: 'S72.001A', encounter_source_type: 'claims', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
      - input: ref('readmissions__index_time_requirement')
        rows: []
      - input: ref('readmissions__index_discharge_requirement')
        rows:
          - {encounter_id: 'E1', tuva_last_run: '2024-01-01 00:00:00'}
      - input: ref('readmissions__exclusion')
        rows: []
    expect:
      rows: []

  - name: test_readmissions_index_admission_fails_discharge_requirement
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: readmissions__index_admission
    description: "Encounter meeting time but not discharge requirement is excluded from index admissions"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('readmissions__encounter')
        rows:
          - {encounter_id: 'E1', person_id: 'P1', admit_date: '2023-06-01', discharge_date: '2023-06-05', discharge_disposition_code: '02', facility_npi: 'NPI1', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 15000, primary_diagnosis_code: 'S72.001A', encounter_source_type: 'claims', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
      - input: ref('readmissions__index_time_requirement')
        rows:
          - {encounter_id: 'E1', tuva_last_run: '2024-01-01 00:00:00'}
      - input: ref('readmissions__index_discharge_requirement')
        rows: []
      - input: ref('readmissions__exclusion')
        rows: []
    expect:
      rows: []

  # =========================================================================
  # READMISSIONS - INTERMEDIATE: exclusion
  # =========================================================================

  - name: test_readmissions_exclusion_filters_excluded_ccs
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: readmissions__exclusion
    description: "Encounters with excluded CCS diagnosis categories are identified"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('readmissions__encounter_with_ccs')
        rows:
          - {encounter_id: 'E1', person_id: 'P1', admit_date: '2023-06-01', discharge_date: '2023-06-05', discharge_disposition_code: '01', facility_npi: 'NPI1', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 15000, primary_diagnosis_code: 'S72.001A', valid_primary_diagnosis_code_flag: 1, ccs_diagnosis_category: '226', tuva_last_run: '2024-01-01 00:00:00'}
          - {encounter_id: 'E2', person_id: 'P2', admit_date: '2023-06-01', discharge_date: '2023-06-05', discharge_disposition_code: '01', facility_npi: 'NPI2', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 10000, primary_diagnosis_code: 'C50.9', valid_primary_diagnosis_code_flag: 1, ccs_diagnosis_category: '11', tuva_last_run: '2024-01-01 00:00:00'}
      - input: ref('readmissions__exclusion_ccs_diagnosis_category')
        rows:
          - {ccs_diagnosis_category: '11'}
    expect:
      rows:
        - {encounter_id: 'E2', tuva_last_run: '2024-01-01 00:00:00'}

  - name: test_readmissions_exclusion_null_ccs_not_excluded
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: readmissions__exclusion
    description: "Encounters with null CCS diagnosis category are not excluded"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('readmissions__encounter_with_ccs')
        rows:
          - {encounter_id: 'E1', person_id: 'P1', admit_date: '2023-06-01', discharge_date: '2023-06-05', discharge_disposition_code: '01', facility_npi: 'NPI1', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 15000, primary_diagnosis_code: 'INVALID', valid_primary_diagnosis_code_flag: 0, ccs_diagnosis_category: null, tuva_last_run: '2024-01-01 00:00:00'}
      - input: ref('readmissions__exclusion_ccs_diagnosis_category')
        rows:
          - {ccs_diagnosis_category: '11'}
    expect:
      rows: []

  # =========================================================================
  # READMISSIONS - INTERMEDIATE: encounter_overlap
  # =========================================================================

  - name: test_readmissions_encounter_overlap_identifies_best
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: readmissions__encounter_overlap
    description: "Overlap model identifies best encounter among overlapping encounters for same person"
    given:
      - input: ref('readmissions__encounter')
        rows:
          - {encounter_id: 'E1', person_id: 'P1', admit_date: '2023-06-01', discharge_date: '2023-06-05', discharge_disposition_code: '01', facility_npi: 'NPI1', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 15000, primary_diagnosis_code: 'S72.001A', encounter_source_type: 'claims', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
          - {encounter_id: 'E2', person_id: 'P2', admit_date: '2023-07-01', discharge_date: '2023-07-03', discharge_disposition_code: '01', facility_npi: 'NPI2', drg_code_type: 'ms-drg', drg_code: '470', paid_amount: 5000, primary_diagnosis_code: 'J18.9', encounter_source_type: 'claims', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
    expect:
      rows:
        - {encounter_id: 'E1', person_id: 'P1', has_overlaps: 0, is_best_encounter: 1}
        - {encounter_id: 'E2', person_id: 'P2', has_overlaps: 0, is_best_encounter: 1}

  - name: test_readmissions_encounter_overlap_collapses_three_way_overlap_without_fanout
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: readmissions__encounter_overlap
    description: "Three encounters that all overlap stay in one overlap group and do not fan out"
    given:
      - input: ref('readmissions__encounter')
        rows:
