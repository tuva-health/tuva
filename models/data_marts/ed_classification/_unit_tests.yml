    given:
      - input: ref('ed_classification__int_map_primary_dx')
        rows:
          - {encounter_id: 'E1', encounter_type: 'emergency department', person_id: 'P1', encounter_end_date: '2023-06-15', facility_npi: 'NPI1', primary_diagnosis_code_type: 'icd-10-cm', primary_diagnosis_code: 'I21.0', primary_diagnosis_description: 'MI', paid_amount: 2000, allowed_amount: 1800, charge_amount: 2500, edcnnpa: 0.10, edcnpa: 0.80, epct: 0.02, noner: 0.01, injury: 0.0, psych: 0.0, alcohol: 0.0, drug: 0.0, ed_classification_capture: 1}
    expect:
      rows:
