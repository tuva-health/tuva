version: 2

unit_tests:

  # =========================================================================
  # ED CLASSIFICATION - INTERMEDIATE: int_filter_encounter_with_classification
  # =========================================================================

  - name: test_ed_classification_filter_picks_greatest_probability
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: ed_classification__int_filter_encounter_with_classification
    description: "Classification is assigned based on the highest probability column using GREATEST"
    given:
      - input: ref('ed_classification__int_map_primary_dx')
        rows:
          - {encounter_id: 'E1', encounter_type: 'emergency department', person_id: 'P1', encounter_end_date: '2023-06-15', facility_npi: 'NPI1', primary_diagnosis_code_type: 'icd-10-cm', primary_diagnosis_code: 'J06.9', primary_diagnosis_description: 'URI', paid_amount: 500, allowed_amount: 400, charge_amount: 600, edcnnpa: 0.88, edcnpa: 0.05, epct: 0.02, noner: 0.01, injury: 0.0, psych: 0.0, alcohol: 0.0, drug: 0.0, ed_classification_capture: 1}
          - {encounter_id: 'E2', encounter_type: 'emergency department', person_id: 'P2', encounter_end_date: '2023-06-16', facility_npi: 'NPI2', primary_diagnosis_code_type: 'icd-10-cm', primary_diagnosis_code: 'S52.0', primary_diagnosis_description: 'Fracture', paid_amount: 700, allowed_amount: 600, charge_amount: 800, edcnnpa: 0.0, edcnpa: 0.0, epct: 0.0, noner: 0.0, injury: 0.95, psych: 0.0, alcohol: 0.0, drug: 0.0, ed_classification_capture: 1}
          - {encounter_id: 'E3', encounter_type: 'emergency department', person_id: 'P3', encounter_end_date: '2023-06-17', facility_npi: 'NPI3', primary_diagnosis_code_type: 'icd-10-cm', primary_diagnosis_code: 'Z99.9', primary_diagnosis_description: 'Unclassified', paid_amount: 200, allowed_amount: 150, charge_amount: 300, edcnnpa: 0.0, edcnpa: 0.0, epct: 0.0, noner: 0.0, injury: 0.0, psych: 0.0, alcohol: 0.0, drug: 0.0, ed_classification_capture: 0}
    expect:
      rows:
        - {encounter_id: 'E1', classification: 'edcnnpa'}
        - {encounter_id: 'E2', classification: 'injury'}

  - name: test_ed_classification_filter_breaks_probability_ties_deterministically
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: ed_classification__int_filter_encounter_with_classification
    description: "Ties fall through the CASE order after GREATEST, so edcnnpa wins over later categories"
    given:
      - input: ref('ed_classification__int_map_primary_dx')
        rows:
          - {encounter_id: 'E1', encounter_type: 'emergency department', person_id: 'P1', encounter_end_date: '2023-06-15', facility_npi: 'NPI1', primary_diagnosis_code_type: 'icd-10-cm', primary_diagnosis_code: 'J06.9', primary_diagnosis_description: 'URI', paid_amount: 500, allowed_amount: 400, charge_amount: 600, edcnnpa: 0.5, edcnpa: 0.0, epct: 0.0, noner: 0.0, injury: 0.5, psych: 0.0, alcohol: 0.0, drug: 0.0, ed_classification_capture: 1}
    expect:
      rows:
        - {encounter_id: 'E1', classification: 'edcnnpa'}

  - name: test_ed_classification_filter_excludes_uncaptured_encounters
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: ed_classification__int_filter_encounter_with_classification
    description: "Encounters with ed_classification_capture=0 are excluded from classification results"
    given:
      - input: ref('ed_classification__int_map_primary_dx')
        rows:
          - {encounter_id: 'E1', encounter_type: 'emergency department', person_id: 'P1', encounter_end_date: '2023-06-15', facility_npi: 'NPI1', primary_diagnosis_code_type: 'icd-10-cm', primary_diagnosis_code: 'Z99.9', primary_diagnosis_description: 'Unknown', paid_amount: 200, allowed_amount: 150, charge_amount: 300, edcnnpa: 0.0, edcnpa: 0.0, epct: 0.0, noner: 0.0, injury: 0.0, psych: 0.0, alcohol: 0.0, drug: 0.0, ed_classification_capture: 0}
    expect:
      rows: []

