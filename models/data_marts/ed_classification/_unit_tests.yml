        rows:
          - {encounter_id: 'E1', encounter_type: 'emergency department', person_id: 'P1', encounter_end_date: '2023-06-15', facility_npi: 'NPI1', primary_diagnosis_code_type: 'icd-10-cm', primary_diagnosis_code: 'R10.9', primary_diagnosis_description: 'Abdominal pain', paid_amount: 400, allowed_amount: 350, charge_amount: 500, edcnnpa: 0.05, edcnpa: 0.05, epct: 0.05, noner: 0.80, injury: 0.0, psych: 0.0, alcohol: 0.0, drug: 0.0, ed_classification_capture: 1}
    expect:
