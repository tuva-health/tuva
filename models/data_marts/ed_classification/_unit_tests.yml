  - name: test_ed_classification_filter_tie_edcnpa_vs_injury
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: ed_classification__int_filter_encounter_with_classification
    description: "When edcnpa ties with injury at the greatest value, CASE order gives edcnpa priority"
    given:
      - input: ref('ed_classification__int_map_primary_dx')
        rows:
          - {encounter_id: 'E1', encounter_type: 'emergency department', person_id: 'P1', encounter_end_date: '2023-06-15', facility_npi: 'NPI1', primary_diagnosis_code_type: 'icd-10-cm', primary_diagnosis_code: 'T14.90', primary_diagnosis_description: 'Injury', paid_amount: 600, allowed_amount: 500, charge_amount: 700, edcnnpa: 0.0, edcnpa: 0.5, epct: 0.0, noner: 0.0, injury: 0.5, psych: 0.0, alcohol: 0.0, drug: 0.0, ed_classification_capture: 1}
    expect:
      rows:
        - {encounter_id: 'E1', classification: 'edcnpa'}

  - name: test_ed_classification_filter_tie_all_equal
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: ed_classification__int_filter_encounter_with_classification
    description: "When all probabilities are equal non-zero, CASE order gives edcnnpa priority"
    given:
      - input: ref('ed_classification__int_map_primary_dx')
        rows:
          - {encounter_id: 'E1', encounter_type: 'emergency department', person_id: 'P1', encounter_end_date: '2023-06-15', facility_npi: 'NPI1', primary_diagnosis_code_type: 'icd-10-cm', primary_diagnosis_code: 'R69', primary_diagnosis_description: 'Unknown', paid_amount: 200, allowed_amount: 150, charge_amount: 250, edcnnpa: 0.125, edcnpa: 0.125, epct: 0.125, noner: 0.125, injury: 0.125, psych: 0.125, alcohol: 0.125, drug: 0.125, ed_classification_capture: 1}
    expect:
      rows:
