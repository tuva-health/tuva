          - {person_id: 'P1', member_id: 'M1', dispensing_date: '2023-04-10', paid_date: '2023-04-15', paid_amount: 75, allowed_amount: 90, payer: 'MCR', plan: 'PlanA', data_source: 'src1'}
    expect:
