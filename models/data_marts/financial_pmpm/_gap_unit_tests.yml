    expect:
      rows:
        - {person_id: 'P1', dispensing_date: '2023-03-15', paid_amount: 200, tuva_last_run: '2024-01-01 00:00:00'}

  - name: test_financial_pmpm_stg_pharmacy_claim_multiple_claims
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: financial_pmpm__stg_pharmacy_claim
    description: "Pharmacy claim staging passes through multiple pharmacy claims"
    overrides:
