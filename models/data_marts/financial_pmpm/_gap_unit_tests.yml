        rows: []
      - input: ref('financial_pmpm__service_category_1_allowed_pivot')
        rows: []
      - input: ref('financial_pmpm__service_category_2_allowed_pivot')
        rows: []
    expect:
      rows:
        - {person_id: 'P1', year_month: '202301', total_paid: 500, medical_paid: 500, tuva_last_run: '2024-01-01 00:00:00'}
        - {person_id: 'P1', year_month: '202302', total_paid: 0, medical_paid: 0, tuva_last_run: '2024-01-01 00:00:00'}

