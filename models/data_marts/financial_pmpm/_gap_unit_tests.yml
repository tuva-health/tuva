version: 2

unit_tests:

  # =========================================================================
  # FINANCIAL PMPM - STAGING: stg_eligibility
  # =========================================================================

  - name: test_financial_pmpm_stg_eligibility_passthrough
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: financial_pmpm__stg_eligibility
    description: "Eligibility staging passes through core eligibility fields"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('core__eligibility')
        rows:
          - {person_id: 'P1', enrollment_start_date: '2023-01-01', enrollment_end_date: '2023-12-31', payer: 'MCR', plan: 'PlanA', data_source: 'src1'}
    expect:
      rows:
        - {person_id: 'P1', enrollment_start_date: '2023-01-01', enrollment_end_date: '2023-12-31', payer: 'MCR', plan: 'PlanA', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}

  - name: test_financial_pmpm_stg_eligibility_multiple_rows
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: financial_pmpm__stg_eligibility
    description: "Eligibility staging handles multiple eligibility records for different payers"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('core__eligibility')
        rows:
          - {person_id: 'P1', enrollment_start_date: '2023-01-01', enrollment_end_date: '2023-06-30', payer: 'MCR', plan: 'PlanA', data_source: 'src1'}
          - {person_id: 'P1', enrollment_start_date: '2023-07-01', enrollment_end_date: '2023-12-31', payer: 'MCD', plan: 'PlanB', data_source: 'src1'}
    expect:
      rows:
        - {person_id: 'P1', enrollment_start_date: '2023-01-01', enrollment_end_date: '2023-06-30', payer: 'MCR', plan: 'PlanA', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
        - {person_id: 'P1', enrollment_start_date: '2023-07-01', enrollment_end_date: '2023-12-31', payer: 'MCD', plan: 'PlanB', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}

  # =========================================================================
  # FINANCIAL PMPM - STAGING: stg_medical_claim
  # =========================================================================

  - name: test_financial_pmpm_stg_medical_claim_passthrough
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: financial_pmpm__stg_medical_claim
    description: "Medical claim staging passes through core medical claim fields"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('core__medical_claim')
        rows:
          - {person_id: 'P1', member_id: 'M1', claim_id: 'C1', claim_line_number: 1, claim_start_date: '2023-03-15', claim_end_date: '2023-03-15', service_category_1: 'inpatient', service_category_2: 'acute inpatient', paid_amount: 1000, allowed_amount: 1200, payer: 'MCR', plan: 'PlanA', data_source: 'src1'}
    expect:
      rows:
        - {person_id: 'P1', claim_id: 'C1', service_category_1: 'inpatient', paid_amount: 1000, tuva_last_run: '2024-01-01 00:00:00'}

  - name: test_financial_pmpm_stg_medical_claim_multiple_lines
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: financial_pmpm__stg_medical_claim
    description: "Medical claim staging passes through multiple claim lines"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('core__medical_claim')
        rows:
          - {person_id: 'P1', member_id: 'M1', claim_id: 'C1', claim_line_number: 1, claim_start_date: '2023-03-15', claim_end_date: '2023-03-15', service_category_1: 'inpatient', service_category_2: 'acute inpatient', paid_amount: 1000, allowed_amount: 1200, payer: 'MCR', plan: 'PlanA', data_source: 'src1'}
          - {person_id: 'P1', member_id: 'M1', claim_id: 'C1', claim_line_number: 2, claim_start_date: '2023-03-15', claim_end_date: '2023-03-15', service_category_1: 'inpatient', service_category_2: 'acute inpatient', paid_amount: 500, allowed_amount: 600, payer: 'MCR', plan: 'PlanA', data_source: 'src1'}
          - {person_id: 'P2', member_id: 'M2', claim_id: 'C2', claim_line_number: 1, claim_start_date: '2023-04-10', claim_end_date: '2023-04-10', service_category_1: 'outpatient', service_category_2: 'emergency department', paid_amount: 800, allowed_amount: 900, payer: 'MCR', plan: 'PlanA', data_source: 'src1'}
    expect:
      rows:
        - {person_id: 'P1', claim_id: 'C1', claim_line_number: 1, service_category_1: 'inpatient', paid_amount: 1000, tuva_last_run: '2024-01-01 00:00:00'}
        - {person_id: 'P1', claim_id: 'C1', claim_line_number: 2, service_category_1: 'inpatient', paid_amount: 500, tuva_last_run: '2024-01-01 00:00:00'}
        - {person_id: 'P2', claim_id: 'C2', claim_line_number: 1, service_category_1: 'outpatient', paid_amount: 800, tuva_last_run: '2024-01-01 00:00:00'}

  # =========================================================================
  # FINANCIAL PMPM - STAGING: stg_pharmacy_claim
  # =========================================================================

