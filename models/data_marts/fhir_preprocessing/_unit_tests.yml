    expect:
      rows:
        - {patient_internal_id: 'P1', resource_internal_id: 'PROC1', procedure_code_system: 'ICD9', procedure_code: '99.04', tuva_last_run: '2024-01-01 00:00:00'}

  # =========================================================================
  # FHIR PREPROCESSING - FINAL: coverage
