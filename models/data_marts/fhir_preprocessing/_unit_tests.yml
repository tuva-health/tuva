        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('fhir_preprocessing__int_coverage')
        rows:
          - {patient_internal_id: 'P1', resource_internal_id: 'COV1', organization_name: 'Aetna', coverage_plan: 'Gold', coverage_period_start: '2023-01-01', coverage_period_end: '2023-12-31', coverage_relationship: 'self', coverage_status: 'active', coverage_subscriber_id: 'SUB1', data_source: 'src1'}
      - input: ref('fhir_preprocessing__int_coverage_type')
