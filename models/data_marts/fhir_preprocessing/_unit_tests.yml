        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('fhir_preprocessing__stg_core__medication')
        rows:
          - {medication_id: 'MED1', person_id: 'P1', source_code_type: 'NDC', ndc_code: '00000000001', ndc_description: 'Aspirin 325mg', rxnorm_code: null, rxnorm_description: null, days_supply: 30, dispensing_date: '2023-06-15', data_source: 'src1'}
          - {medication_id: 'MED2', person_id: 'P2', source_code_type: 'RXNORM', ndc_code: null, ndc_description: null, rxnorm_code: '1049502', rxnorm_description: 'Lisinopril 10mg', days_supply: 90, dispensing_date: '2023-07-01', data_source: 'src1'}
    expect:
