        - {patient_internal_id: 'P2', resource_internal_id: 'MED2', medication_dispense_status: 'completed', medication_code_system: 'RXNORM', medication_code: '1049502', medication_code_display: 'Lisinopril 10mg', medication_dispense_days_supply_value: 90, data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}

  - name: test_fhir_medication_dispense_ndc_over_rxnorm
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: fhir_preprocessing__medication_dispense
    description: "When both NDC and RXNORM codes present, NDC takes priority"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
