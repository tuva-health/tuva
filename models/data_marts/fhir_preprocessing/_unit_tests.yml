version: 2

unit_tests:

  # =========================================================================
  # FHIR PREPROCESSING - FINAL: patient
  # =========================================================================

  - name: test_fhir_patient_maps_race_unk
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: fhir_preprocessing__patient
    description: "Patient model maps null race to 'UNK' and passes through other fields"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('fhir_preprocessing__stg_core__patient')
        rows:
          - {person_id: 'P1', first_name: 'John', last_name: 'Doe', sex: 'male', race: null, birth_date: '1960-01-01', data_source: 'src1'}
          - {person_id: 'P2', first_name: 'Jane', last_name: 'Smith', sex: 'female', race: 'white', birth_date: '1975-06-15', data_source: 'src1'}
    expect:
      rows:
        - {patient_internal_id: 'P1', name_first: 'John', name_last: 'Doe', gender: 'male', race: 'UNK', birth_date: '1960-01-01', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
        - {patient_internal_id: 'P2', name_first: 'Jane', name_last: 'Smith', gender: 'female', race: 'white', birth_date: '1975-06-15', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}

  - name: test_fhir_patient_renames_columns
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: fhir_preprocessing__patient
    description: "Patient model renames person_id to patient_internal_id, first_name to name_first, last_name to name_last, sex to gender"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('fhir_preprocessing__stg_core__patient')
        rows:
          - {person_id: 'P99', first_name: 'Alice', last_name: 'Brown', sex: 'female', race: 'black', birth_date: '1990-03-20', data_source: 'src2'}
    expect:
      rows:
        - {patient_internal_id: 'P99', name_first: 'Alice', name_last: 'Brown', gender: 'female', race: 'black', birth_date: '1990-03-20', data_source: 'src2', tuva_last_run: '2024-01-01 00:00:00'}

  # =========================================================================
  # FHIR PREPROCESSING - FINAL: condition
  # =========================================================================

  - name: test_fhir_condition_maps_code_system_and_adds_dot
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: fhir_preprocessing__condition
    description: "Condition model maps icd-10-cm to ICD10, inserts dot in codes > 3 chars, and filters claim conditions"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('fhir_preprocessing__stg_core__condition')
        rows:
          - {person_id: 'P1', condition_id: 'COND1', encounter_id: 'E1', recorded_date: '2023-06-15', onset_date: '2023-06-10', resolved_date: null, status: 'active', normalized_code_type: 'icd-10-cm', normalized_code: 'E1165', claim_id: null, data_source: 'src1', condition_rank: 1}
          - {person_id: 'P2', condition_id: 'COND2', encounter_id: 'E2', recorded_date: '2023-07-01', onset_date: null, resolved_date: null, status: 'active', normalized_code_type: 'icd-10-cm', normalized_code: 'I10', claim_id: null, data_source: 'src1', condition_rank: 1}
          - {person_id: 'P3', condition_id: 'COND3', encounter_id: 'E3', recorded_date: '2023-08-01', onset_date: null, resolved_date: null, status: 'active', normalized_code_type: 'icd-10-cm', normalized_code: 'J441', claim_id: 'CLM1', data_source: 'src1', condition_rank: 1}
      - input: ref('fhir_preprocessing__stg_core__encounter')
        rows:
          - {encounter_id: 'E1', encounter_group: 'inpatient', encounter_start_date: '2023-06-10', encounter_end_date: '2023-06-15', person_id: 'P1', data_source: 'src1'}
          - {encounter_id: 'E2', encounter_group: 'outpatient', encounter_start_date: '2023-07-01', encounter_end_date: '2023-07-01', person_id: 'P2', data_source: 'src1'}
    expect:
      rows:
        - {patient_internal_id: 'P1', resource_internal_id: 'COND1', condition_code: 'E11.65', condition_code_system: 'ICD10', encounter_class_code: 'IMP', tuva_last_run: '2024-01-01 00:00:00'}
        - {patient_internal_id: 'P2', resource_internal_id: 'COND2', condition_code: 'I10', condition_code_system: 'ICD10', encounter_class_code: 'AMB', tuva_last_run: '2024-01-01 00:00:00'}

  - name: test_fhir_condition_filters_claim_conditions
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: fhir_preprocessing__condition
    description: "Condition model excludes conditions with a non-null claim_id since those belong in EOB"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('fhir_preprocessing__stg_core__condition')
        rows:
          - {person_id: 'P1', condition_id: 'COND1', encounter_id: 'E1', recorded_date: '2023-06-15', onset_date: null, resolved_date: null, status: 'active', normalized_code_type: 'icd-10-cm', normalized_code: 'I10', claim_id: 'CLM1', data_source: 'src1', condition_rank: 1}
          - {person_id: 'P2', condition_id: 'COND2', encounter_id: 'E2', recorded_date: '2023-07-01', onset_date: null, resolved_date: null, status: 'active', normalized_code_type: 'icd-10-cm', normalized_code: 'E119', claim_id: null, data_source: 'src1', condition_rank: 1}
      - input: ref('fhir_preprocessing__stg_core__encounter')
        rows:
          - {encounter_id: 'E2', encounter_group: 'outpatient', encounter_start_date: '2023-07-01', encounter_end_date: '2023-07-01', person_id: 'P2', data_source: 'src1'}
    expect:
      rows:
        - {patient_internal_id: 'P2', resource_internal_id: 'COND2', condition_code: 'E11.9', condition_code_system: 'ICD10', encounter_class_code: 'AMB', tuva_last_run: '2024-01-01 00:00:00'}

  - name: test_fhir_condition_filters_null_code_type
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: fhir_preprocessing__condition
    description: "Condition model filters out conditions where normalized_code_type is null"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('fhir_preprocessing__stg_core__condition')
        rows:
          - {person_id: 'P1', condition_id: 'COND1', encounter_id: 'E1', recorded_date: '2023-06-15', onset_date: null, resolved_date: null, status: 'active', normalized_code_type: null, normalized_code: 'SOME', claim_id: null, data_source: 'src1', condition_rank: 1}
      - input: ref('fhir_preprocessing__stg_core__encounter')
        rows:
          - {encounter_id: 'E1', encounter_group: 'outpatient', encounter_start_date: '2023-06-15', encounter_end_date: '2023-06-15', person_id: 'P1', data_source: 'src1'}
    expect:
      rows: []

  - name: test_fhir_condition_maps_icd9_code_system
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: fhir_preprocessing__condition
    description: "Condition model maps icd-9-cm to ICD9 code system"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('fhir_preprocessing__stg_core__condition')
        rows:
          - {person_id: 'P1', condition_id: 'COND1', encounter_id: 'E1', recorded_date: '2023-06-15', onset_date: null, resolved_date: null, status: 'active', normalized_code_type: 'icd-9-cm', normalized_code: '250.00', claim_id: null, data_source: 'src1', condition_rank: 1}
      - input: ref('fhir_preprocessing__stg_core__encounter')
        rows:
          - {encounter_id: 'E1', encounter_group: 'office based', encounter_start_date: '2023-06-15', encounter_end_date: '2023-06-15', person_id: 'P1', data_source: 'src1'}
    expect:
      rows:
        - {patient_internal_id: 'P1', resource_internal_id: 'COND1', condition_code: '250.00', condition_code_system: 'ICD9', encounter_class_code: 'AMB', tuva_last_run: '2024-01-01 00:00:00'}

  - name: test_fhir_condition_encounter_class_other
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: fhir_preprocessing__condition
    description: "Condition model maps encounter groups other than inpatient/outpatient/office based to 'other'"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('fhir_preprocessing__stg_core__condition')
        rows:
          - {person_id: 'P1', condition_id: 'COND1', encounter_id: 'E1', recorded_date: '2023-06-15', onset_date: null, resolved_date: null, status: 'active', normalized_code_type: 'icd-10-cm', normalized_code: 'I10', claim_id: null, data_source: 'src1', condition_rank: 1}
      - input: ref('fhir_preprocessing__stg_core__encounter')
        rows:
          - {encounter_id: 'E1', encounter_group: 'snf', encounter_start_date: '2023-06-15', encounter_end_date: '2023-06-15', person_id: 'P1', data_source: 'src1'}
    expect:
      rows:
        - {patient_internal_id: 'P1', resource_internal_id: 'COND1', condition_code: 'I10', condition_code_system: 'ICD10', encounter_class_code: 'other', tuva_last_run: '2024-01-01 00:00:00'}

  - name: test_fhir_condition_onset_defaults_to_recorded
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: fhir_preprocessing__condition
    description: "Condition model defaults onset_date to recorded_date when onset_date is null"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('fhir_preprocessing__stg_core__condition')
        rows:
          - {person_id: 'P1', condition_id: 'COND1', encounter_id: 'E1', recorded_date: '2023-06-15', onset_date: null, resolved_date: null, status: 'active', normalized_code_type: 'icd-10-cm', normalized_code: 'I10', claim_id: null, data_source: 'src1', condition_rank: 1}
      - input: ref('fhir_preprocessing__stg_core__encounter')
        rows:
          - {encounter_id: 'E1', encounter_group: 'outpatient', encounter_start_date: '2023-06-15', encounter_end_date: '2023-06-15', person_id: 'P1', data_source: 'src1'}
    expect:
      rows:
        - {patient_internal_id: 'P1', condition_onset_datetime: '2023-06-15', condition_recorded_datetime: '2023-06-15', tuva_last_run: '2024-01-01 00:00:00'}

  # =========================================================================
  # FHIR PREPROCESSING - FINAL: procedure
  # =========================================================================

  - name: test_fhir_procedure_maps_code_system
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: fhir_preprocessing__procedure
    description: "Procedure model maps icd-10-pcs to ICD10 code system and filters out claim procedures"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('fhir_preprocessing__stg_core__procedure')
        rows:
          - {person_id: 'P1', procedure_id: 'PROC1', normalized_code_type: 'icd-10-pcs', normalized_code: '0DBN0ZZ', normalized_description: 'Excision sigmoid colon', source_code_type: null, source_code: null, source_description: null, procedure_date: '2023-06-15', practitioner_id: 'NPI1', claim_id: null, data_source: 'src1'}
          - {person_id: 'P2', procedure_id: 'PROC2', normalized_code_type: 'icd-10-pcs', normalized_code: '0HBT0ZZ', normalized_description: 'Excision breast', source_code_type: null, source_code: null, source_description: null, procedure_date: '2023-07-01', practitioner_id: 'NPI2', claim_id: 'CLM1', data_source: 'src1'}
          - {person_id: 'P3', procedure_id: null, normalized_code_type: 'icd-10-pcs', normalized_code: '0DBN0ZZ', normalized_description: null, source_code_type: null, source_code: null, source_description: null, procedure_date: '2023-08-01', practitioner_id: null, claim_id: null, data_source: 'src1'}
    expect:
      rows:
        - {patient_internal_id: 'P1', resource_internal_id: 'PROC1', procedure_code_system: 'ICD10', procedure_code: '0DBN0ZZ', procedure_status: 'completed', tuva_last_run: '2024-01-01 00:00:00'}

  - name: test_fhir_procedure_filters_null_procedure_id
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: fhir_preprocessing__procedure
    description: "Procedure model filters out rows with null procedure_id"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('fhir_preprocessing__stg_core__procedure')
        rows:
          - {person_id: 'P1', procedure_id: null, normalized_code_type: 'icd-10-pcs', normalized_code: '0DBN0ZZ', normalized_description: null, source_code_type: null, source_code: null, source_description: null, procedure_date: '2023-06-15', practitioner_id: null, claim_id: null, data_source: 'src1'}
    expect:
      rows: []

  - name: test_fhir_procedure_filters_null_code_type
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: fhir_preprocessing__procedure
    description: "Procedure model filters out rows where normalized_code_type is null"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('fhir_preprocessing__stg_core__procedure')
        rows:
          - {person_id: 'P1', procedure_id: 'PROC1', normalized_code_type: null, normalized_code: null, normalized_description: null, source_code_type: null, source_code: null, source_description: null, procedure_date: '2023-06-15', practitioner_id: null, claim_id: null, data_source: 'src1'}
    expect:
      rows: []

  - name: test_fhir_procedure_uses_source_code_fallback
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: fhir_preprocessing__procedure
    description: "Procedure model falls back to source_code_type and source_code when normalized values are null"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('fhir_preprocessing__stg_core__procedure')
        rows:
          - {person_id: 'P1', procedure_id: 'PROC1', normalized_code_type: null, normalized_code: null, normalized_description: null, source_code_type: 'icd-10-pcs', source_code: 'ABC123', source_description: 'Some proc', procedure_date: '2023-06-15', practitioner_id: 'NPI1', claim_id: null, data_source: 'src1'}
    expect:
      rows:
        - {patient_internal_id: 'P1', resource_internal_id: 'PROC1', procedure_code_system: 'ICD10', procedure_code: 'ABC123', procedure_display: 'Some proc', tuva_last_run: '2024-01-01 00:00:00'}

  - name: test_fhir_procedure_maps_icd9_pcs
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: fhir_preprocessing__procedure
