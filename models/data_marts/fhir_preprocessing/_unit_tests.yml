  - name: test_fhir_coverage_joins_type_list
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: fhir_preprocessing__coverage
    description: "Coverage model joins intermediate coverage to coverage type list"
    overrides:
