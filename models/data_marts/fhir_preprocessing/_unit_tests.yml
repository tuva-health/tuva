  - name: test_fhir_medication_dispense_source_code_type_fallback
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: fhir_preprocessing__medication_dispense
    description: "When no NDC or RXNORM code, medication_code_system falls back to source_code_type"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('fhir_preprocessing__stg_core__medication')
        rows:
          - {medication_id: 'MED1', person_id: 'P1', source_code_type: 'CUSTOM', ndc_code: null, ndc_description: null, rxnorm_code: null, rxnorm_description: null, days_supply: 14, dispensing_date: '2023-06-15', data_source: 'src1'}
    expect:
      rows:
        - {patient_internal_id: 'P1', resource_internal_id: 'MED1', medication_code_system: 'CUSTOM', medication_code: null, medication_code_display: null, tuva_last_run: '2024-01-01 00:00:00'}

  # =========================================================================
  # FHIR PREPROCESSING - FINAL: observation (union of lab_result + observation)
  # =========================================================================

  - name: test_fhir_observation_unions_lab_and_obs
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: fhir_preprocessing__observation
    description: "Observation model unions lab results and observations into a single output"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('fhir_preprocessing__int_lab_result')
        rows:
          - {patient_internal_id: 'P1', resource_internal_id: 'LR1', encounter_internal_id: 'E1', observation_status: 'final', observation_category: 'laboratory', observation_code_system: 'LOINC', observation_code: '2345-7', observation_code_text: 'Glucose', observation_datetime: '2023-06-15', observation_value: '120', observation_value_units: 'mg/dL', data_source: 'src1'}
      - input: ref('fhir_preprocessing__int_observation')
        rows:
          - {patient_internal_id: 'P2', resource_internal_id: 'OBS1', encounter_internal_id: 'E2', observation_status: 'final', observation_category: 'vital-signs', observation_code_system: 'LOINC', observation_code: '8480-6', observation_code_text: 'Systolic BP', observation_datetime: '2023-06-15', observation_value: '140', observation_value_units: 'mmHg', data_source: 'src1'}
    expect:
