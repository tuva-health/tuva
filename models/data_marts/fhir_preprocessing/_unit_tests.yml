  # =========================================================================
  # FHIR PREPROCESSING - FINAL: medication_dispense
  # =========================================================================

  - name: test_fhir_medication_dispense_maps_ndc
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
