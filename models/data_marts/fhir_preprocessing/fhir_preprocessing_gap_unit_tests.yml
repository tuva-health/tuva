    expect:
      rows:
        - {lab_result_id: 'LR1', person_id: 'P1', code_type: 'loinc', code: '2345-7', description: 'Glucose', data_source: 'src1'}

  # =========================================================================
  # INTERMEDIATE: int_pharmacy_claim_eob
  # =========================================================================

  - name: test_fhir_int_pharmacy_claim_eob_type_pharmacy
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: fhir_preprocessing__int_pharmacy_claim_eob
    description: "Pharmacy claim EOB sets eob_type_code to 'pharmacy' and null subtypes"
    given:
      - input: ref('fhir_preprocessing__stg_core__eligibility')
        rows:
          - {eligibility_id: 'ELG1', person_id: 'P1', member_id: 'M1', payer_type: 'commercial', payer: 'MCR', plan: 'PlanA', enrollment_start_date: '2023-01-01', enrollment_end_date: '2023-12-31', subscriber_relation: 'self', subscriber_id: 'SUB1', data_source: 'src1'}
      - input: ref('fhir_preprocessing__stg_core__pharmacy_claim')
        rows:
          - {pharmacy_claim_id: 'PC1', person_id: 'P1', claim_id: 'C1', claim_line_number: 1, payer: 'MCR', plan: 'PlanA', dispensing_provider_id: 'NPI1', dispensing_provider_name: 'PharmA', dispensing_date: '2023-06-15', paid_date: '2023-06-20', days_supply: 30, refills: 0, paid_amount: 50.00, in_network_flag: 1, ndc_code: '00000000001', data_source: 'src1'}
      - input: ref('fhir_preprocessing__int_pharmacy_claim_supporting_info')
        rows: []
      - input: ref('fhir_preprocessing__int_pharmacy_claim_item')
        rows: []
      - input: ref('fhir_preprocessing__int_pharmacy_claim_total')
        rows: []
    expect:
      rows:
        - {patient_internal_id: 'P1', resource_internal_id: 'PC1', eob_type_code: 'pharmacy', eob_subtype_code: null, eob_billable_period_start: null, eob_billable_period_end: null, data_source: 'src1'}

  - name: test_fhir_int_pharmacy_claim_eob_dummy_practitioner
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: fhir_preprocessing__int_pharmacy_claim_eob
    description: "Pharmacy claim EOB defaults to dummy practitioner when dispensing_provider_id is null"
    given:
      - input: ref('fhir_preprocessing__stg_core__eligibility')
        rows: []
      - input: ref('fhir_preprocessing__stg_core__pharmacy_claim')
        rows:
          - {pharmacy_claim_id: 'PC1', person_id: 'P1', claim_id: 'C1', claim_line_number: 1, payer: 'MCR', plan: 'PlanA', dispensing_provider_id: null, dispensing_provider_name: null, dispensing_date: '2023-06-15', paid_date: '2023-06-20', days_supply: 30, refills: 0, paid_amount: 50.00, in_network_flag: 1, ndc_code: '00000000001', data_source: 'src1'}
      - input: ref('fhir_preprocessing__int_pharmacy_claim_supporting_info')
        rows: []
      - input: ref('fhir_preprocessing__int_pharmacy_claim_item')
        rows: []
      - input: ref('fhir_preprocessing__int_pharmacy_claim_total')
        rows: []
    expect:
      rows:
        - {patient_internal_id: 'P1', practitioner_internal_id: '9999999999', practitioner_name_text: 'Dummy Practitioner', data_source: 'src1'}
