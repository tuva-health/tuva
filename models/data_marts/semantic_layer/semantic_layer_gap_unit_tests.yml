  # =========================================================================

  - name: test_semantic_layer_stg_ahrq_pqi_summary_passthrough
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: semantic_layer__stg_ahrq_measures__pqi_summary
    description: "PQI summary staging passes through pqi_number, pqi_name, encounter_id and appends tuva_last_run"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('ahrq_measures__pqi_summary')
        rows:
          - {pqi_number: 'PQI01', pqi_name: 'Diabetes Short-Term Complications', encounter_id: 'E1'}
    expect:
