version: 2

unit_tests:

  # =========================================================================
  # AHRQ MEASURES - STAGING: stg_pqi_condition
  # =========================================================================

  - name: test_ahrq_stg_pqi_condition_passthrough
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: ahrq_measures__stg_pqi_condition
    description: "PQI condition staging passes through normalized code fields from core condition"
    given:
      - input: ref('core__condition')
        rows:
          - {normalized_code_type: 'icd-10-cm', normalized_code: 'E11.65', encounter_id: 'E1', data_source: 'src1'}
    expect:
      rows:
        - {normalized_code_type: 'icd-10-cm', normalized_code: 'E11.65', encounter_id: 'E1', data_source: 'src1'}

  # =========================================================================
  # AHRQ MEASURES - STAGING: stg_pqi_patient
  # =========================================================================

  - name: test_ahrq_stg_pqi_patient_passthrough
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: ahrq_measures__stg_pqi_patient
    description: "PQI patient staging passes through demographics from core patient"
    given:
      - input: ref('core__patient')
        rows:
          - {data_source: 'src1', birth_date: '1960-01-01', person_id: 'P1', sex: 'female'}
    expect:
      rows:
        - {data_source: 'src1', birth_date: '1960-01-01', person_id: 'P1', sex: 'female'}

  # =========================================================================
  # AHRQ MEASURES - STAGING: stg_pqi_member_months
  # =========================================================================

  - name: test_ahrq_stg_pqi_member_months_joins_calendar
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: ahrq_measures__stg_pqi_member_months
    description: "PQI member months staging joins core member_months with calendar to get first_day_of_month"
    given:
      - input: ref('core__member_months')
        rows:
          - {data_source: 'src1', person_id: 'P1', year_month: '202306'}
      - input: ref('reference_data__calendar')
        rows:
          - {year_month: '2023-06', first_day_of_month: '2023-06-01'}
    expect:
      rows:
        - {data_source: 'src1', person_id: 'P1', first_day_of_month: '2023-06-01', year_month: '202306'}

  # =========================================================================
  # AHRQ MEASURES - STAGING: stg_pqi_procedure
  # =========================================================================

  - name: test_ahrq_stg_pqi_procedure_passthrough
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: ahrq_measures__stg_pqi_procedure
    description: "PQI procedure staging passes through normalized code fields from core procedure"
    given:
      - input: ref('core__procedure')
        rows:
          - {normalized_code_type: 'icd-10-pcs', normalized_code: '0210093', encounter_id: 'E1', data_source: 'src1'}
    expect:
      rows:
        - {normalized_code_type: 'icd-10-pcs', normalized_code: '0210093', encounter_id: 'E1', data_source: 'src1'}

  # =========================================================================
  # AHRQ MEASURES - SHARED EXCLUSION: missing_dates
  # =========================================================================

  - name: test_ahrq_pqi_shared_exclusion_missing_dates
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: ahrq_measures__int_pqi_shared_exclusion_missing_dates
    description: "Missing dates exclusion identifies encounters with null start date"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('ahrq_measures__stg_pqi_inpatient_encounter')
        rows:
          - {encounter_id: 'E1', data_source: 'src1', drg_code: '470', drg_description: 'Hip', admit_source_code: '1', encounter_start_date: null, encounter_end_date: '2023-06-05', length_of_stay: 4, primary_diagnosis_code: 'S72.001A', person_id: 'P1', facility_npi: 'NPI1', paid_amount: 15000, year_number: 2023}
          - {encounter_id: 'E2', data_source: 'src1', drg_code: '470', drg_description: 'Hip', admit_source_code: '1', encounter_start_date: '2023-06-01', encounter_end_date: '2023-06-05', length_of_stay: 4, primary_diagnosis_code: 'S72.001A', person_id: 'P2', facility_npi: 'NPI1', paid_amount: 15000, year_number: 2023}
    expect:
      rows:
        - {encounter_id: 'E1', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}

