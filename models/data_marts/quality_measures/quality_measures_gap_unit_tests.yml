version: 2

unit_tests:

  # =========================================================================
  # QUALITY MEASURES - STAGING: stg_core__condition
  # =========================================================================

  - name: test_quality_measures_stg_condition_passthrough
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: quality_measures__stg_core__condition
    description: "Condition staging passes through key fields from core condition"
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('core__condition')
        rows:
          - {person_id: 'P1', claim_id: 'C1', encounter_id: 'E1', recorded_date: '2023-06-01', source_code_type: 'icd-10-cm', source_code: 'E11.65', normalized_code_type: 'icd-10-cm', normalized_code: 'E11.65'}
    expect:
      rows:
        - {person_id: 'P1', claim_id: 'C1', encounter_id: 'E1', recorded_date: '2023-06-01', source_code_type: 'icd-10-cm', source_code: 'E11.65', normalized_code_type: 'icd-10-cm', normalized_code: 'E11.65', tuva_last_run: '2024-01-01 00:00:00'}

