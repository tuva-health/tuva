version: 2

unit_tests:

  # =========================================================================
  # STAGING: normalize__stg_unmapped_condition
  # =========================================================================

  - name: test_stg_unmapped_condition_filters_unmapped_rows
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: normalize__stg_unmapped_condition
    description: >
      Staging condition model should only return rows where normalized_code
      and normalized_description are both null, and source_code/source_description
      are not both null.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
        claims_enabled: true
        enable_normalize_engine: "unmapped"
    given:
      - input: ref('core__condition')
        rows:
          - {source_code_type: 'icd-10-cm', source_code: 'E11.65', source_description: 'Type 2 diabetes', normalized_code: null, normalized_description: null, data_source: 'src1'}
          - {source_code_type: 'icd-10-cm', source_code: 'A00.0', source_description: 'Cholera', normalized_code: 'A000', normalized_description: 'Cholera due to V. cholerae', data_source: 'src1'}
          - {source_code_type: null, source_code: null, source_description: null, normalized_code: null, normalized_description: null, data_source: 'src1'}
    expect:
      rows:
        - {source_code_type: 'icd-10-cm', source_code: 'E11.65', source_description: 'Type 2 diabetes', item_count: 1, domain: 'condition', data_source: 'src1'}

  - name: test_stg_unmapped_condition_counts_duplicates
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: normalize__stg_unmapped_condition
    description: >
      Staging condition model should count multiple rows with the same
      source_code as separate items.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
        claims_enabled: true
        enable_normalize_engine: "unmapped"
    given:
      - input: ref('core__condition')
        rows:
          - {source_code_type: 'icd-10-cm', source_code: 'E11.65', source_description: 'Type 2 diabetes', normalized_code: null, normalized_description: null, data_source: 'src1'}
          - {source_code_type: 'icd-10-cm', source_code: 'E11.65', source_description: 'Type 2 diabetes', normalized_code: null, normalized_description: null, data_source: 'src1'}
          - {source_code_type: 'icd-10-cm', source_code: 'E11.65', source_description: 'Type 2 diabetes', normalized_code: null, normalized_description: null, data_source: 'src1'}
    expect:
      rows:
        - {source_code_type: 'icd-10-cm', source_code: 'E11.65', source_description: 'Type 2 diabetes', item_count: 3, domain: 'condition', data_source: 'src1'}

  - name: test_stg_unmapped_condition_excludes_already_mapped
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: normalize__stg_unmapped_condition
    description: >
      Rows that already have a normalized_code should be excluded from
      the unmapped condition staging model.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
        claims_enabled: true
        enable_normalize_engine: "unmapped"
    given:
      - input: ref('core__condition')
        rows:
          - {source_code_type: 'icd-10-cm', source_code: 'A00.0', source_description: 'Cholera', normalized_code: 'A000', normalized_description: 'Cholera vibrio', data_source: 'src1'}
          - {source_code_type: 'snomed', source_code: '123456', source_description: 'Some condition', normalized_code: null, normalized_description: 'Mapped description', data_source: 'src1'}
    expect:
      rows: []

