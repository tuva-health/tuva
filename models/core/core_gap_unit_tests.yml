version: 2

unit_tests:

  # =========================================================================
  # CORE - STAGING: stg_claims_patient
  # Note: Row_number should prefer the latest enrollment period, including
  # open-ended rows where enrollment_end_date is null.
  # =========================================================================

  - name: test_core_stg_claims_patient_prefers_open_ended_enrollment
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: core__stg_claims_patient
    description: >
      When a person has multiple enrollment periods, the open-ended row wins
      because the row_number ordering treats null enrollment_end_date as the
      latest possible date.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
        claims_enabled: true
    given:
      - input: ref('normalized_input__eligibility')
        rows:
          - {person_id: 'P1', name_suffix: null, first_name: 'Old', middle_name: null, last_name: 'Member', gender: 'male', race: 'white', birth_date: '1960-03-15', death_date: null, death_flag: 0, social_security_number: null, address: null, city: null, state: null, zip_code: null, phone: null, email: null, ethnicity: null, data_source: 'src1', enrollment_start_date: '2023-01-01', enrollment_end_date: '2023-06-30'}
          - {person_id: 'P1', name_suffix: null, first_name: 'Current', middle_name: null, last_name: 'Member', gender: 'male', race: 'white', birth_date: '1960-03-15', death_date: null, death_flag: 0, social_security_number: null, address: null, city: null, state: null, zip_code: null, phone: null, email: null, ethnicity: null, data_source: 'src1', enrollment_start_date: '2023-07-01', enrollment_end_date: null}
      - input: ref('input_layer__eligibility')
        rows:
          - {person_id: 'P1', data_source: 'src1'}
    expect:
      rows:
        - {person_id: 'P1', first_name: 'Current', last_name: 'Member', birth_date: '1960-03-15', age: 63, age_group: '60-69', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}

  # =========================================================================
  # CORE - STAGING: stg_claims_medical_claim
  # Fanout prevention depends on claim_line_attribution_number = 1 and
  # duplicate_row_number = 1 joins.
  # =========================================================================

  # =========================================================================
  # CORE - STAGING: stg_claims_pharmacy_claim
  # Tests enrollment flag logic and pharmacy_claim_id generation.
  # =========================================================================

  - name: test_stg_claims_pharmacy_claim_generates_pk_and_enrollment_flag
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: core__stg_claims_pharmacy_claim
    description: >
      The staging model generates pharmacy_claim_id from claim_id, claim_line_number,
      and data_source. The enrollment_flag is set to 1 when enrollment data matches.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
        claims_enabled: true
    given:
      - input: ref('normalized_input__pharmacy_claim')
        rows:
          - {claim_id: 'RX1', claim_line_number: 1, person_id: 'P1', member_id: 'M1', payer: 'MCR', plan: 'PlanA', prescribing_provider_id: 'NPI1', prescribing_provider_name: 'Dr Smith', dispensing_provider_id: 'NPI2', dispensing_provider_name: 'CVS', dispensing_date: '2023-06-01', ndc_code: '12345678901', ndc_description: 'Test Drug', quantity: 30, days_supply: 30, refills: 3, paid_date: '2023-06-15', paid_amount: 50.00, allowed_amount: 45.00, charge_amount: 60.00, coinsurance_amount: 5.00, copayment_amount: 10.00, deductible_amount: 0, in_network_flag: 1, data_source: 'src1', file_date: null, ingest_datetime: null, file_name: null}
          - {claim_id: 'RX2', claim_line_number: 1, person_id: 'P2', member_id: 'M2', payer: 'MCR', plan: 'PlanB', prescribing_provider_id: null, prescribing_provider_name: null, dispensing_provider_id: null, dispensing_provider_name: null, dispensing_date: '2023-07-01', ndc_code: '99999999999', ndc_description: null, quantity: 60, days_supply: 60, refills: 0, paid_date: null, paid_amount: 100.00, allowed_amount: null, charge_amount: null, coinsurance_amount: null, copayment_amount: null, deductible_amount: null, in_network_flag: 0, data_source: 'src1', file_date: null, ingest_datetime: null, file_name: null}
      - input: ref('claims_enrollment__flag_rx_claims_with_enrollment')
        rows:
          - {claim_id: 'RX1', claim_line_number: 1, person_id: 'P1', payer: 'MCR', plan: 'PlanA', data_source: 'src1', member_month_key: 'MM1'}
      - input: ref('input_layer__pharmacy_claim')
        rows:
          - {person_id: 'P1', data_source: 'src1'}
    expect:
      rows:
        - {pharmacy_claim_id: 'RX1-1-src1', claim_id: 'RX1', claim_line_number: 1, person_id: 'P1', ndc_code: '12345678901', enrollment_flag: 1, member_month_key: 'MM1', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}
        - {pharmacy_claim_id: 'RX2-1-src1', claim_id: 'RX2', claim_line_number: 1, person_id: 'P2', ndc_code: '99999999999', enrollment_flag: 0, member_month_key: null, data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}

  # =========================================================================
