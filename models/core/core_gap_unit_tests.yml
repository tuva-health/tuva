    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: core__stg_claims_practitioner
    description: >
      The staging model joins NPIs from medical and pharmacy claims to the
      provider terminology table and filters to only individual providers.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
        claims_enabled: true
    given:
      - input: ref('core__stg_claims_medical_claim')
        rows:
          - {facility_npi: 'NPI_ORG', rendering_npi: 'NPI_IND', billing_npi: null}
      - input: ref('core__stg_claims_pharmacy_claim')
        rows:
          - {prescribing_provider_id: 'NPI_IND', dispensing_provider_id: 'NPI_ORG'}
      - input: ref('terminology__provider')
        rows:
          - {npi: 'NPI_IND', entity_type_description: 'Individual', provider_first_name: 'Jane', provider_last_name: 'Doe', parent_organization_name: 'Health Corp', primary_specialty_description: 'Family Medicine', provider_organization_name: null, practice_address_line_1: null, practice_city: null, practice_state: null, practice_zip_code: null, entity_type_code: '1'}
          - {npi: 'NPI_ORG', entity_type_description: 'Organization', provider_first_name: null, provider_last_name: null, parent_organization_name: 'Big Hospital', primary_specialty_description: null, provider_organization_name: 'Big Hospital', practice_address_line_1: '100 Main St', practice_city: 'Anytown', practice_state: 'NY', practice_zip_code: '10001', entity_type_code: '2'}
    expect:
