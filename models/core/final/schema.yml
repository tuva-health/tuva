      - name: procedure_type
        description: "Type of procedure claim based or clinical"
        tests:
          - not_null
          - accepted_values:
              values: ['claims', 'clinical']
      - name: tuva_last_run
        description: "Timestamp of last dbt run"
        tests:
          - not_null

