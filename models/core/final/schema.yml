version: 2

models:
  - name: core__patient
    description: >
      Patient dimension table containing one record per unique patient.
    columns:
      - name: patient_id
        description: "Unique patient identifier"
        tests:
          - not_null
          - unique
      - name: sex
        description: "Patient sex"
        tests:
          - not_null
          - accepted_values:
              values: ['male', 'female', 'unknown']
      - name: birth_date
        description: "Patient date of birth"
        tests:
          - not_null
      - name: death_flag
        description: "1 if patient is deceased 0 otherwise"
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]
      - name: tuva_last_run
        description: "Timestamp of last dbt run"
        tests:
          - not_null

  - name: core__encounter
    description: >
      Encounter fact table containing one record per unique patient encounter.
    columns:
      - name: encounter_id
        description: "Unique encounter identifier"
        tests:
          - not_null
          - unique
      - name: encounter_type
        description: "Type of encounter"
        tests:
          - not_null
          - accepted_values:
              values:
                - acute inpatient
                - ambulatory surgery center
                - emergency department
                - home health
                - hospice
                - inpatient psychiatric
                - inpatient rehabilitation
                - lab
                - office visit
                - outpatient
                - outpatient psychiatric
                - outpatient rehabilitation
                - skilled nursing facility
                - telehealth
                - urgent care
      - name: encounter_start_date
        description: "Date the encounter began"
        tests:
          - not_null
      - name: tuva_last_run
        description: "Timestamp of last dbt run"
        tests:
          - not_null

  - name: core__condition
    description: >
      Condition fact table containing one record per unique patient condition.
    columns:
      - name: condition_id
        description: "Unique condition identifier"
        tests:
          - not_null
          - unique
      - name: patient_id
        description: "Foreign key to patient"
        tests:
          - not_null
      - name: condition_type
        description: "Type of condition claim based or clinical"
        tests:
          - not_null
          - accepted_values:
              values: ['claims', 'clinical']
      - name: tuva_last_run
        description: "Timestamp of last dbt run"
        tests:
          - not_null

  - name: core__procedure
