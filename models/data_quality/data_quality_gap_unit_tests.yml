        - {table_name: 'pharmacy_claim', metric: 'Total Unique Patients', input_layer_value: 1, core_value: 1, tuva_last_run: '2024-01-01 00:00:00'}
        - {table_name: 'pharmacy_claim', metric: 'Total Unique Claims', input_layer_value: 1, core_value: 1, tuva_last_run: '2024-01-01 00:00:00'}
