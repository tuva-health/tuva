  - name: test_data_loss_ignores_duplicate_rows_in_distinct_counts
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: data_quality__data_loss
    description: >
      Duplicate input rows should not inflate distinct patient or
      span counts, but they should still increase raw record counts.
      This catches fanout regressions in the count logic.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
