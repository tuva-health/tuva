          - {person_id: 'P1', member_id: 'M1', enrollment_start_date: '2023-01-01', enrollment_end_date: '2023-12-31', payer: 'MCR', plan: 'PlanA'}
      - input: ref('data_quality__eligibility_dq_stage')
