version: 2

unit_tests:

  # =========================================================================
  # STAGE MODELS
  # =========================================================================

  - name: test_stg_immunization_passthrough
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: data_quality__stg_immunization
    description: >
      Passes through all rows from the immunization source without
      any filtering.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('immunization')
        rows:
          - {person_id: 'P1', occurrence_date: '2023-01-15', normalized_code: 'CVX001'}
          - {person_id: 'P2', occurrence_date: '2023-06-01', normalized_code: 'CVX002'}
    expect:
      rows:
        - {person_id: 'P1', occurrence_date: '2023-01-15', normalized_code: 'CVX001'}
        - {person_id: 'P2', occurrence_date: '2023-06-01', normalized_code: 'CVX002'}

  # =========================================================================
  # MART REVIEW FINAL MODELS
  # =========================================================================

  - name: test_number_of_conditions_counts_per_patient
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: mart_review__number_of_conditions
    description: >
      Counts the number of chronic conditions per patient by joining
      core patient to tuva chronic conditions. Patients without
      conditions get a count of 0.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('core__patient')
        rows:
          - {person_id: 'P1', data_source: 'src1'}
          - {person_id: 'P2', data_source: 'src1'}
          - {person_id: 'P3', data_source: 'src1'}
      - input: ref('chronic_conditions__tuva_chronic_conditions_long')
        rows:
          - {person_id: 'P1', condition: 'Diabetes'}
          - {person_id: 'P1', condition: 'Hypertension'}
          - {person_id: 'P2', condition: 'Asthma'}
    expect:
      rows:
        - {person_id: 'P1', data_source: 'src1', numofconditions: 2, tuva_last_run: '2024-01-01 00:00:00'}
        - {person_id: 'P2', data_source: 'src1', numofconditions: 1, tuva_last_run: '2024-01-01 00:00:00'}
        - {person_id: 'P3', data_source: 'src1', numofconditions: 0, tuva_last_run: '2024-01-01 00:00:00'}

  - name: test_patient_adds_data_source_key
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: mart_review__patient
    description: >
      Passes through all patient records and adds a
      patient_data_source_key by concatenating person_id and
      data_source.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('core__patient')
        rows:
          - {person_id: 'P1', data_source: 'src1'}
          - {person_id: 'P2', data_source: 'src2'}
    expect:
      rows:
        - {person_id: 'P1', data_source: 'src1', patient_data_source_key: 'P1|src1'}
        - {person_id: 'P2', data_source: 'src2', patient_data_source_key: 'P2|src2'}

  - name: test_tuva_chronic_conditions_with_and_without_conditions
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: mart_review__tuva_chronic_conditions
    description: >
      Patients with chronic conditions get a row per condition.
      Patients without any chronic conditions get a single row
      with 'No Chronic Conditions'.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('chronic_conditions__tuva_chronic_conditions_long')
        rows:
          - {person_id: 'P1', condition: 'Diabetes'}
          - {person_id: 'P1', condition: 'Hypertension'}
      - input: ref('core__patient')
        rows:
          - {person_id: 'P1', data_source: 'src1'}
          - {person_id: 'P2', data_source: 'src1'}
    expect:
      rows:
        - {person_id: 'P1', data_source: 'src1', condition: 'Diabetes', patient_source_key: 'P1|src1', tuva_last_run: '2024-01-01 00:00:00'}
        - {person_id: 'P1', data_source: 'src1', condition: 'Hypertension', patient_source_key: 'P1|src1', tuva_last_run: '2024-01-01 00:00:00'}
        - {person_id: 'P2', data_source: 'src1', condition: 'No Chronic Conditions', patient_source_key: 'P2|src1', tuva_last_run: '2024-01-01 00:00:00'}

  - name: test_pmpm_calculates_absolute_amounts
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: mart_review__pmpm
    description: >
      Multiplies per-member-per-month rates by member_months to
      produce absolute paid amounts.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('financial_pmpm__pmpm_payer')
        rows:
          - {data_source: 'src1', year_month: '202301', payer: 'MCR', member_months: 100, total_paid: 5.0, medical_paid: 4.0, pharmacy_paid: 1.0, inpatient_paid: 2.0, outpatient_paid: 1.0, office_based_paid: 0.5, ancillary_paid: 0.3, other_paid: 0.2}
    expect:
      rows:
        - {data_source: 'src1', year_month: '202301', member_months: 100, total_paid: 5.0, medical_paid: 4.0, pharmacy_paid: 1.0, total_paid_absolute: 500.0, medical_paid_absolute: 400.0, pharmacy_paid_absolute: 100.0, inpatient_paid_absolute: 200.0, outpatient_paid_absolute: 100.0, office_based_paid_absolute: 50.0, ancillary_paid_absolute: 30.0, other_paid_absolute: 20.0, data_source_month_key: 'src1|202301'}

  - name: test_ed_classification_classifies_ed_encounters
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: mart_review__ed_classification
    description: >
      Filters core encounters to emergency department type and
      joins to ED classification for avoidable categorization.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('core__encounter')
        rows:
          - {encounter_id: 'E1', encounter_type: 'emergency department', paid_amount: 500.00, primary_diagnosis_code: 'R10.9', primary_diagnosis_description: 'Abdominal pain', facility_npi: 'NPI1', allowed_amount: 600.00, charge_amount: 800.00, data_source: 'src1', length_of_stay: 0, discharge_disposition_code: '01', discharge_disposition_description: 'Home', person_id: 'P1', facility_name: 'Hospital A', encounter_start_date: '2023-06-01'}
          - {encounter_id: 'E2', encounter_type: 'acute inpatient', paid_amount: 1000.00, primary_diagnosis_code: 'J18.9', primary_diagnosis_description: 'Pneumonia', facility_npi: 'NPI2', allowed_amount: 1200.00, charge_amount: 1500.00, data_source: 'src1', length_of_stay: 3, discharge_disposition_code: '01', discharge_disposition_description: 'Home', person_id: 'P2', facility_name: 'Hospital B', encounter_start_date: '2023-07-01'}
      - input: ref('ed_classification__summary')
        rows:
          - {encounter_id: 'E1', ed_classification_description: 'Emergent, Primary Care Treatable', ed_classification_order: '4'}
      - input: ref('core__location')
        rows:
          - {location_id: 'NPI1', npi: 'NPI1', name: 'Hospital A'}
      - input: ref('ccsr__dx_vertical_pivot')
        rows:
          - {code: 'R10.9', ccsr_parent_category: 'SYM001', ccsr_category: 'SYM001A', ccsr_category_description: 'Abdominal pain', ccsr_category_rank: 1}
      - input: ref('ccsr__dxccsr_v2023_1_body_systems')
        rows:
          - {ccsr_parent_category: 'SYM001', body_system: 'Symptoms'}
    expect:
      rows:
        - {encounter_id: 'E1', ed_classification_description: 'Emergent, Primary Care Treatable', avoidable_category: 'Non-Avoidable', paid_amount: 500.00, primary_diagnosis_code: 'R10.9', data_source: 'src1', tuva_last_run: '2024-01-01 00:00:00'}

  - name: test_pharmacy_joins_ndc_and_calculates_cost
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: mart_review__pharmacy
    description: >
      Joins pharmacy claims to NDC terminology and calculates
      cost_per_day and thirty_day_equivalent_cost from paid_amount
      and days_supply. days_supply of 0 produces null cost.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('core__pharmacy_claim')
        rows:
          - {claim_id: 'RX1', claim_line_number: '1', person_id: 'P1', data_source: 'src1', ndc_code: '12345678901', paid_amount: 300.00, allowed_amount: 350.00, prescribing_provider_id: 'PR1', prescribing_provider_name: 'Dr. Smith', dispensing_provider_id: 'D1', dispensing_provider_name: 'Pharmacy A', paid_date: '2023-06-15', dispensing_date: '2023-06-01', days_supply: 30, quantity: 90}
          - {claim_id: 'RX2', claim_line_number: '1', person_id: 'P2', data_source: 'src1', ndc_code: '99999999999', paid_amount: 100.00, allowed_amount: 120.00, prescribing_provider_id: null, prescribing_provider_name: null, dispensing_provider_id: null, dispensing_provider_name: null, paid_date: '2023-07-01', dispensing_date: '2023-07-01', days_supply: 0, quantity: 10}
      - input: ref('terminology__ndc')
        rows:
          - {ndc: '12345678901', fda_description: 'Drug A', rxnorm_description: 'DrugA RxNorm', rxcui: 'RX001'}
      - input: ref('terminology__rxnorm_brand_generic')
        rows:
          - {product_rxcui: 'RX001', brand_name: 'BrandA', brand_vs_generic: 'brand', ingredient_name: 'IngredientA'}
      - input: ref('terminology__rxnorm_to_atc')
        rows:
          - {rxcui: 'RX001', atc_1_name: 'ATC1', atc_2_name: 'ATC2', atc_3_name: 'ATC3', atc_4_name: 'ATC4'}
      - input: ref('core__practitioner')
        rows:
          - {practitioner_id: 'PR1', specialty: 'Internal Medicine'}
      - input: ref('pharmacy__pharmacy_claim_expanded')
        rows:
          - {data_source: 'src1', claim_id: 'RX1', claim_line_number: '1', generic_available_total_opportunity: 50.00, generic_average_cost_per_unit: 1.00, brand_cost_per_unit: 3.33, generic_available: 'Y', generic_available_sk: 1}
    expect:
      rows:
        - {claim_id: 'RX1', person_id: 'P1', ndc_code: '12345678901', ndc_description: 'Drug A', paid_amount: 300.00, cost_per_day: 10.0, thirty_day_equivalent_cost: 300.0, specialty_tier: 0, brand_name: 'BrandA', brand_vs_generic: 'brand', generic_available: 'Y', tuva_last_run: '2024-01-01 00:00:00'}
        - {claim_id: 'RX2', person_id: 'P2', ndc_code: '99999999999', ndc_description: null, paid_amount: 100.00, cost_per_day: null, thirty_day_equivalent_cost: null, specialty_tier: 0, brand_name: null, brand_vs_generic: null, generic_available: null, tuva_last_run: '2024-01-01 00:00:00'}

  - name: test_crosswalk_field_to_mart_sk_deduplicates_duplicate_rows
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: data_quality__crosswalk_field_to_mart_sk
    description: >
      Duplicate detail and crosswalk rows for the same field should
      collapse to a single dense_rank key per field/table/claim type
      combination.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
        claims_enabled: true
    given:
      - input: ref('data_quality__data_quality_detail')
        rows:
          - {table_name: 'medical_claim', claim_type: 'institutional', field_name: 'bill_type_code'}
          - {table_name: 'medical_claim', claim_type: 'institutional', field_name: 'bill_type_code'}
      - input: ref('data_quality__crosswalk_field_to_mart')
        rows:
          - {input_layer_table_name: 'medical_claim', claim_type: 'institutional', field_name: 'bill_type_code', mart_name: 'encounters'}
          - {input_layer_table_name: 'medical_claim', claim_type: 'institutional', field_name: 'bill_type_code', mart_name: 'encounters'}
    expect:
      rows:
        - {input_layer_table_name: 'medical_claim', claim_type: 'institutional', field_name: 'bill_type_code', mart_name: null, table_claim_type_field_sk: 1, tuva_last_run: '2024-01-01 00:00:00'}
        - {input_layer_table_name: 'medical_claim', claim_type: 'institutional', field_name: 'bill_type_code', mart_name: 'encounters', table_claim_type_field_sk: 1, tuva_last_run: '2024-01-01 00:00:00'}

  - name: test_data_quality_for_pbi_unions_claims_and_clinical_rows
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: data_quality__data_quality_for_pbi
    description: >
      When both claims and clinical testing outputs are enabled, the
      final PBI model should union both sources and stamp clinical
      rows with claim_type='CLINICAL'.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
        claims_enabled: true
        clinical_enabled: true
    given:
      - input: ref('data_quality__data_quality_claims_for_pbi')
        rows:
          - {summary_sk: 1, data_source: 'src1', table_name: 'medical_claim', claim_type: 'INSTITUTIONAL', field_name: 'bill_type_code', bucket_name: 'invalid', invalid_reason: 'bad value', drill_down_key: 'claim_id', drill_down_value: 'MC1', field_value: '999', frequency: 1}
      - input: ref('data_quality__data_quality_clinical_for_pbi')
        rows:
          - {summary_sk: 100001, data_source: 'src2', table_name: 'appointment', field_name: 'appointment_start_datetime', bucket_name: 'valid', invalid_reason: null, drill_down_key: 'appointment_id', drill_down_value: 'A1', field_value: '2023-06-01', frequency: 1}
    expect:
      rows:
        - {summary_sk: 1, data_source: 'src1', table_name: 'medical_claim', claim_type: 'INSTITUTIONAL', field_name: 'bill_type_code', bucket_name: 'invalid', field_value: '999', drill_down_key: 'claim_id', drill_down_value: 'MC1', invalid_reason: 'bad value', frequency: 1, tuva_last_run: '2024-01-01 00:00:00'}
        - {summary_sk: 100001, data_source: 'src2', table_name: 'appointment', claim_type: 'CLINICAL', field_name: 'appointment_start_datetime', bucket_name: 'valid', field_value: '2023-06-01', drill_down_key: 'appointment_id', drill_down_value: 'A1', invalid_reason: null, frequency: 1, tuva_last_run: '2024-01-01 00:00:00'}

  # =========================================================================
  # DQI STAGE — Institutional inpatient bill type 12 filter
  # =========================================================================

  - name: test_stg_institutional_inpatient_filters_bill_type_12
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: data_quality__stg_institutional_inpatient
    description: >
      Claims with institutional claim_type and bill_type_code starting with
      '12' are also identified as inpatient claims.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('input_layer__medical_claim')
        rows:
          - {claim_id: 'MC1', claim_type: 'institutional', bill_type_code: '121', claim_line_number: '1'}
          - {claim_id: 'MC2', claim_type: 'institutional', bill_type_code: '129', claim_line_number: '1'}
          - {claim_id: 'MC3', claim_type: 'professional', bill_type_code: '121', claim_line_number: '1'}
    expect:
      rows: []

  # =========================================================================
  # DQI ATOMIC CHECKS — Clinical condition source_code pattern
  # =========================================================================

  - name: test_clinical_condition_source_code_valid_and_null
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: data_quality__condition_source_code
    description: >
      The clinical atomic check for condition source_code classifies
      non-null values as 'valid' and null values as 'null'.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('condition')
        rows:
          - {data_source: 'src1', condition_id: 'COND1', source_code: 'J06.9', recorded_date: '2023-06-15'}
          - {data_source: 'src1', condition_id: 'COND2', source_code: null, recorded_date: '2023-07-01'}
    expect:
      rows:
        - {data_source: 'src1', table_name: 'CONDITION', field_name: 'SOURCE_CODE', drill_down_value: 'COND1', bucket_name: 'valid', field_value: 'J06.9', tuva_last_run: '2024-01-01 00:00:00'}
        - {data_source: 'src1', table_name: 'CONDITION', field_name: 'SOURCE_CODE', drill_down_value: 'COND2', bucket_name: 'null', field_value: null, tuva_last_run: '2024-01-01 00:00:00'}

  # =========================================================================
  # DQI ATOMIC CHECKS — Claims eligibility gender validation
  # =========================================================================

  - name: test_eligibility_gender_valid_invalid_null
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: data_quality__eligibility_gender
    description: >
      The claims atomic check for eligibility gender validates values
      against the terminology__gender table, producing 'valid', 'invalid',
      or 'null' buckets.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('eligibility')
        rows:
          - {data_source: 'src1', member_id: 'M1', enrollment_start_date: '2023-01-01', gender: 'female'}
          - {data_source: 'src1', member_id: 'M2', enrollment_start_date: '2023-01-01', gender: 'UNKNOWN_VALUE'}
          - {data_source: 'src1', member_id: 'M3', enrollment_start_date: '2023-01-01', gender: null}
      - input: ref('terminology__gender')
        rows:
          - {gender: 'female'}
          - {gender: 'male'}
    expect:
      rows:
        - {data_source: 'src1', table_name: 'ELIGIBILITY', field_name: 'GENDER', drill_down_value: 'M1', bucket_name: 'valid', field_value: 'female', tuva_last_run: '2024-01-01 00:00:00'}
        - {data_source: 'src1', table_name: 'ELIGIBILITY', field_name: 'GENDER', drill_down_value: 'M2', bucket_name: 'invalid', field_value: 'UNKNOWN_VALUE', tuva_last_run: '2024-01-01 00:00:00'}
        - {data_source: 'src1', table_name: 'ELIGIBILITY', field_name: 'GENDER', drill_down_value: 'M3', bucket_name: 'null', field_value: null, tuva_last_run: '2024-01-01 00:00:00'}

  # =========================================================================
  # DQI FINAL — Crosswalk field to mart SK with multiple fields
  # =========================================================================

  - name: test_crosswalk_field_to_mart_sk_multiple_fields_ranked
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: data_quality__crosswalk_field_to_mart_sk
    description: >
      Multiple fields from different tables each get their own
      dense_rank SK value, ordered by table/claim_type/field.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('data_quality__data_quality_detail')
        rows:
          - {table_name: 'eligibility', claim_type: 'ELIGIBILITY', field_name: 'birth_date'}
          - {table_name: 'eligibility', claim_type: 'ELIGIBILITY', field_name: 'gender'}
          - {table_name: 'medical_claim', claim_type: 'INSTITUTIONAL', field_name: 'bill_type_code'}
      - input: ref('data_quality__crosswalk_field_to_mart')
        rows: []
    expect:
      rows:
        - {input_layer_table_name: 'eligibility', claim_type: 'ELIGIBILITY', field_name: 'birth_date', mart_name: null, table_claim_type_field_sk: 1, tuva_last_run: '2024-01-01 00:00:00'}
        - {input_layer_table_name: 'eligibility', claim_type: 'ELIGIBILITY', field_name: 'gender', mart_name: null, table_claim_type_field_sk: 2, tuva_last_run: '2024-01-01 00:00:00'}
        - {input_layer_table_name: 'medical_claim', claim_type: 'INSTITUTIONAL', field_name: 'bill_type_code', mart_name: null, table_claim_type_field_sk: 3, tuva_last_run: '2024-01-01 00:00:00'}
