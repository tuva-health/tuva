  - name: test_eligibility_address_valid
    config:
      enabled: "{{ var('tuva_unit_tests_enabled', false) | as_bool }}"
    model: data_quality__eligibility_address
    description: >
      Address is non-null so bucket should be valid.
    overrides:
      vars:
        tuva_last_run: '2024-01-01 00:00:00'
    given:
      - input: ref('eligibility')
        rows:
          - {data_source: 'src1', enrollment_start_date: '2023-01-01', member_id: 'M1', address: '123 Main St'}
    expect:
      rows:
        - {data_source: 'src1', table_name: 'eligibility', field_name: 'ADDRESS', bucket_name: 'valid'}

