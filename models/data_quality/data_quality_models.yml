        - dq
        - dq2
        - dq_analytics
        - dq_analytical
      materialized: table
    columns:
      - name: data_source
        description: The data source for the analytical metric.
      - name: domain
        description: The high-level analytical domain for the metric.
      - name: metric
        description: The analytical metric name.
      - name: result
        description: Formatted analytical metric output. Count-style metrics are rendered as whole-number text values, while utilization, PMPM, prevalence, percentage, and average metrics are rendered as text values rounded to at most two decimal places.
      - name: medicare
        description: Placeholder payer-segment result column. This pass leaves the value null for every row.
      - name: commercial
        description: Placeholder payer-segment result column. This pass leaves the value null for every row.
      - name: medicaid
        description: Placeholder payer-segment result column. This pass leaves the value null for every row.


