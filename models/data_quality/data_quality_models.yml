  - name: data_quality__analytical_key_metrics
    description: Analytical key metrics aggregated by unioning persisted per-metric models from the analytical key_metrics layer in the data_quality schema. Results are formatted from the analytical metric manifest, which is also the source of truth for each metric model and result type.
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_data_quality
