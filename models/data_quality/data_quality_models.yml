      - name: member_id
        description: Member identifier for the eligibility span.
      - name: enrollment_start_date
        description: Start date of the eligibility span.
      - name: enrollment_end_date
        description: End date of the eligibility span.
      - name: data_source
        description: Input-layer data source associated with the eligibility span.

  - name: data_quality__eligibility_person_flags
