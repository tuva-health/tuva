version: 2

anchors:
  - &string |
    {%- if target.type in ("bigquery", "databricks") -%} string
    {%- else -%} varchar(255)
    {%- endif -%}
  - &datetime |
    {%- if target.type == "fabric" -%} datetime2(0)
    {%- elif target.type in ("athena", "databricks") -%} timestamp
    {%- else -%} datetime
    {%- endif -%}
  - &float |
    {%- if target.type in ("athena", "databricks") -%} real
    {%- else -%} float
    {%- endif -%}

seeds:
  - name: synthetic_data__appointment
    config:
      schema: |
        {%- if var('tuva_schema_prefix',None) != None -%}{{var('tuva_schema_prefix')}}_synthetic_data{% else %}synthetic_data{%- endif -%}
      alias: appointment
      tags:
        - synthetic_data
        - clinical
      enabled: |
        {% if var('use_synthetic_data') == true -%} {{ true|as_bool }} {%- else -%} {{ false|as_bool }} {%- endif -%}
      column_types:
        appointment_id: *string
        person_id: *string
        patient_id: *string
        encounter_id: *string
        source_appointment_type_code: *string
        source_appointment_type_description: *string
        normalized_appointment_type_code: *string
        normalized_appointment_type_description: *string
        start_datetime: *datetime
        end_datetime: *datetime
        duration: integer
        location_id: *string
        practitioner_id: *string
        source_status: *string
        normalized_status: *string
        appointment_specialty: *string
