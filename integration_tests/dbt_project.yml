name: 'integration_tests'
version: '1.0.0'
config-version: 2

profile: default

vars:
  ## Broad enablement vars
  claims_enabled: true
  clinical_enabled: true
  provider_attribution_enabled: true
  semantic_layer_enabled: true
  # Use selectors to run specific marts.
  # fhir_preprocessing_enabled: true # defaults to false

  ## Synthetic data bootstrap configuration
  synthetic_data_size: small
  custom_bucket_name: tuva-public-resources
  tuva_seed_version: "0.18.0"
  tuva_seed_buckets: {}

  ## Passthrough Columns Configuration
  # Allows custom columns with a prefix to flow through Tuva models to core outputs.
  # passthrough:
  #   prefix: 'x_'    # Prefix to identify passthrough columns (default: 'x_')
  #   strip: false    # Whether to strip prefix in final output (default: false)

  ## CMS HCC data mart vars
  # The payment_year variable has a default of the current year.
  # To override it, set a numeric value such as cms_hcc_payment_year: 2019.
  # cms_hcc_payment_year: 2018

  ## Quality Measures period var
  # To run quality measures for a period other than current year, uncomment below.
  # quality_measures_period_end: "2018-12-31"


model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
clean-targets:
  - "target"
  - "dbt_packages"


dispatch:
  - macro_namespace: 'the_tuva_project'
    search_order: ['integration_tests', 'the_tuva_project']
  - macro_namespace: 'dbt_utils'
    search_order: ['integration_tests', 'the_tuva_project', 'dbt_utils']


seeds:
  integration_tests:
    raw_data__appointment:
      +post-hook: "{{ the_tuva_project.load_versioned_synthetic_seed('appointment') }}"
    raw_data__eligibility:
      +post-hook: "{{ the_tuva_project.load_versioned_synthetic_seed('eligibility') }}"
    raw_data__immunization:
      +post-hook: "{{ the_tuva_project.load_versioned_synthetic_seed('immunization') }}"
    raw_data__lab_result:
      +post-hook: "{{ the_tuva_project.load_versioned_synthetic_seed('lab_result') }}"
    raw_data__medical_claim:
      +batch_size: 200
      +post-hook: "{{ the_tuva_project.load_versioned_synthetic_seed('medical_claim') }}"
    raw_data__observation:
      +post-hook: "{{ the_tuva_project.load_versioned_synthetic_seed('observation') }}"
    raw_data__pharmacy_claim:
      +post-hook: "{{ the_tuva_project.load_versioned_synthetic_seed('pharmacy_claim') }}"
    raw_data__provider_attribution:
      +post-hook: "{{ the_tuva_project.load_versioned_synthetic_seed('provider_attribution') }}"


models:
  integration_tests:
    +materialized: ephemeral
flags:
  require_generic_test_arguments_property: true
